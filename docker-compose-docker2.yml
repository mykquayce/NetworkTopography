services:
  apache:
    image: httpd:${HTTPD_IMAGE_TAG:?missing apache image tag}
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.apache-router.entrypoints: lan
      traefik.http.routers.apache-router.rule: Host(`apache.bob.house`)
      traefik.http.routers.apache-router.tls: "true"
      traefik.http.services.apache-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /usr/local/apache2/logs/, ]
    volumes: [ ./htdocs/:/usr/local/apache2/htdocs/:ro, ]

  apprise:
    image: caronc/apprise:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      APPRISE_ADMIN: "y"
      APPRISE_STATEFUL_MODE: simple
      APPRISE_WORKER_COUNT: "1"
      TZ: Etc/UTC
    healthcheck:
      test: curl --fail http://localhost:8000/status || exit 1
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.apprise-router.entrypoints: lan
      traefik.http.routers.apprise-router.rule: Host(`apprise.bob.house`)
      traefik.http.routers.apprise-router.tls: "true"
      traefik.http.services.apprise-service.loadbalancer.server.port: "8000"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: 1000:1000
    tmpfs: [ /tmp/, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/apprise/attach/:/attach/:rw
      - ${DATA_DIR:-/opt/appdata}/apprise/config/:/config/:rw
      - ${DATA_DIR:-/opt/appdata}/apprise/plugin/:/plugin/:rw

  changedetection:
    image: dgtlmoon/changedetection.io:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.changedetection-router.entrypoints: lan
      traefik.http.routers.changedetection-router.rule: Host(`changedetection.bob.house`)
      traefik.http.routers.changedetection-router.tls: "true"
      traefik.http.services.changedetection-service.loadbalancer.server.port: "5000"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/changedetection/:/datastore/:rw

  donetick:
    image: donetick/donetick:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      DT_ENV: selfhosted
      DT_SQLITE_PATH: /donetick-data/donetick.db
    labels:
      traefik.http.routers.donetick-router.entrypoints: lan
      traefik.http.routers.donetick-router.rule: Host(`donetick.bob.house`)
      traefik.http.routers.donetick-router.tls: "true"
      traefik.http.services.donetick-service.loadbalancer.server.port: "2021"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/donetick/:/donetick-data/:rw
      - ./donetick/selfhosted.yaml:/config/selfhosted.yaml:ro

  degoog:
    image: ghcr.io/fccview/degoog:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      gluetun-ransom:
        condition: service_healthy
    labels:
      traefik.enable: "false"
    network_mode: service:gluetun-ransom
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/degoog/:/app/data/:rw

  drawio:
    image: jgraph/drawio:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
    labels:
      traefik.http.routers.drawio-router.entrypoints: lan
      traefik.http.routers.drawio-router.rule: Host(`drawio.bob.house`)
      traefik.http.routers.drawio-router.tls: "true"
      traefik.http.services.drawio-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]

  drydock:
    image: codeswhat/drydock:latest
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    depends_on:
      socket-proxy:
        condition: service_healthy
      traefik:
        condition: service_healthy
      trivy:
        condition: service_healthy
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/drydock.env
    environment:
      DD_AUTH_BASIC_ADMIN_USER: admin
      DD_NOTIFICATION_NTFY_NTFY_TOPIC: 364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
      DD_NOTIFICATION_NTFY_NTFY_URL: https://ntfy.bob.house/
      DD_SECURITY_BLOCK_SEVERITY: CRITICAL,HIGH
      DD_SECURITY_SCANNER: trivy
      DD_SECURITY_SCAN_CRON: 0 3 * * *          # every day at 3 AM
      DD_SECURITY_SCAN_JITTER: "60000"          # up to 60s random delay
      DD_SECURITY_SCAN_CONCURRENCY: "4"         # scan up to 4 digests in parallel
      DD_SECURITY_SCAN_BATCH_TIMEOUT: "1800000" # abort remaining digest queue after 30m
      DD_SECURITY_TRIVY_SERVER: https://trivy.bob.house
      DD_SECURITY_TRIVY_TIMEOUT: "120000"
      DD_SERVER_FEATURE_DELETE: "false"
      DD_SERVER_TRUSTPROXY: "1" 
      #DD_WATCHER_BILLUPS_HOST: billups.bob.house
      #DD_WATCHER_BILLUPS_CRON: 0 0,6,12,18 * * *
      #DD_WATCHER_BILLUPS_WATCHBYDEFAULT: "false"
      DD_WATCHER_FREEMAN_HOST: freeman.bob.house
      DD_WATCHER_FREEMAN_CRON: 0 1,7,13,19 * * *
      DD_WATCHER_FREEMAN_WATCHBYDEFAULT: "false"
      DD_WATCHER_KAYSHON_HOST: kayshon.bob.house
      DD_WATCHER_KAYSHON_CRON: 0 2,8,14,20 * * *
      DD_WATCHER_KAYSHON_WATCHBYDEFAULT: "false"
      DD_WATCHER_RANSOM_HOST: socket-proxy
      DD_WATCHER_RANSOM_CRON: 0 3,9,15,21 * * *
      DD_WATCHER_RANSOM_WATCHBYDEFAULT: "false"
      DD_WATCHER_SHAXS_HOST: shaxs.bob.house
      DD_WATCHER_SHAXS_CRON: 0 4,10,16,22 * * *
      DD_WATCHER_SHAXS_WATCHBYDEFAULT: "false"
      DD_WATCHER_TANA_HOST: tana.bob.house
      DD_WATCHER_TANA_CRON: 0 5,11,17,23 * * *
      DD_WATCHER_TANA_WATCHBYDEFAULT: "false"
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.drydock-router.entrypoints: lan
      traefik.http.routers.drydock-router.rule: Host(`drydock.bob.house`)
      traefik.http.routers.drydock-router.tls: "true"
      traefik.http.services.drydock-service.loadbalancer.server.port: "3000"
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    networks:
      default: null
      socket-proxy: null
      traefik: null

  freshrss:
    image: freshrss/freshrss:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      CRON_MIN: 3,33
      TZ: UTC
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/freshrss.env
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.freshrss-router.entrypoints: lan
      traefik.http.routers.freshrss-router.rule: Host(`freshrss.bob.house`)
      traefik.http.routers.freshrss-router.tls: "true"
      traefik.http.services.freshrss-service.loadbalancer.server.port: "80"
    logging:
      options:
        max-size: 10m
    security_opt: [ no-new-privileges=true, ]
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    tmpfs: [ /var/www/FreshRSS/data/cache/, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/freshrss/data/:/var/www/FreshRSS/data/:rw
      - ${DATA_DIR:-/opt/appdata}/freshrss/extensions/:/var/www/FreshRSS/extensions/:rw

  gluetun-ransom:
    image: qmcgaw/gluetun:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHECKPOINT_RESTORE, CHOWN, DAC_OVERRIDE, FOWNER, NET_ADMIN, NET_RAW, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: Etc/UTC
      SERVER_COUNTRIES: Austria,Germany,Italy,Luxembourg,Poland
      UPDATER_PERIOD: 24h
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/gluetun.env
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.gluetun-router.entrypoints: lan
      traefik.http.routers.gluetun-router.rule: Host(`gluetun-ransom.bob.house`)
      traefik.http.routers.gluetun-router.tls: "true"
      traefik.http.routers.gluetun-router.service: gluetun-service
      traefik.http.services.gluetun-service.loadbalancer.server.port: "8000"
      traefik.http.routers.degoog-router.entrypoints: lan
      traefik.http.routers.degoog-router.rule: Host(`degoog.bob.house`)
      traefik.http.routers.degoog-router.tls: "true"
      traefik.http.routers.degoog-router.service: degoog-service
      traefik.http.services.degoog-service.loadbalancer.server.port: "4444"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]

  grafana:
    image: grafana/grafana-oss:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP: "true"
      GF_ENABLE_GZIP: "true"
      GF_SERVER_ROOT_URL: https://grafana.bob.house
      GF_USERS_ALLOW_SIGN_UP: "false"
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/grafana.env
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.grafana-router.entrypoints: lan
      traefik.http.routers.grafana-router.rule: Host(`grafana.bob.house`)
      traefik.http.routers.grafana-router.tls: "true"
      traefik.http.services.grafana-service.loadbalancer.server.port: "3000"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: "0"
    volumes:
      - ${DATA_DIR:-/opt/appdata}/grafana/:/var/lib/grafana/:rw

  httpbin:
    image: mccutchen/go-httpbin:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.httpbin-router.entrypoints: lan
      traefik.http.routers.httpbin-router.rule: Host(`httpbin.bob.house`)
      traefik.http.routers.httpbin-router.tls: "true"
      traefik.http.services.httpbin-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]

  it-tools:
    image: ghcr.io/corentinth/it-tools:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.it-tools-router.entrypoints: lan
      traefik.http.routers.it-tools-router.rule: Host(`it-tools.bob.house`)
      traefik.http.routers.it-tools-router.tls: "true"
      traefik.http.services.it-tools-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]

  jsonpath:
    image: ashphy/jsonpath-online-evaluator:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.jsonpath-router.entrypoints: lan
      traefik.http.routers.jsonpath-router.rule: Host(`jsonpath.bob.house`)
      traefik.http.routers.jsonpath-router.tls: "true"
      traefik.http.services.jsonpath-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]

  moodist:
    image: ghcr.io/remvze/moodist:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, NET_BIND_SERVICE, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.moodist-router.entrypoints: lan
      traefik.http.routers.moodist-router.rule: Host(`moodist.bob.house`)
      traefik.http.routers.moodist-router.tls: "true"
      traefik.http.services.moodist-service.loadbalancer.server.port: "8080"
    logging:
      options:
        max-size: 1g
    networks:
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]

  nsd01:
    build:
      dockerfile_inline: |
        FROM alpine:${ALPINE_IMAGE_TAG:?missing alpine image tag}
        RUN apk add --no-cache --update nsd
        CMD ["sh", "-c", "nsd; sleep infinity"]
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    healthcheck:
      test: ["CMD-SHELL", "nslookup -type=CNAME homepage.bob.house 127.0.0.1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      dd.registry.lookup.image: library/alpine:${ALPINE_IMAGE_TAG:?missing alpine image tag}
      dd.tag.family: loose
      dd.watch: "true"
      traefik.enable: "false"
    networks:
      default: null
    ports:
      - 192.168.1.65:53:53/tcp
      - 192.168.1.65:53:53/udp
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ./nsd/nsd.conf:/etc/nsd/nsd.conf:ro
      - ./nsd/db.bob.house.1:/zones/db.bob.house:ro

  nsd20:
    build:
      dockerfile_inline: |
        FROM alpine:${ALPINE_IMAGE_TAG:?missing alpine image tag}
        RUN apk add --no-cache --update nsd
        CMD ["sh", "-c", "nsd; sleep infinity"]
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    healthcheck:
      test: ["CMD-SHELL", "nslookup -type=CNAME homepage.bob.house 127.0.0.1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      dd.registry.lookup.image: library/alpine:${ALPINE_IMAGE_TAG:?missing alpine image tag}
      dd.tag.family: loose
      dd.watch: "true"
      traefik.enable: "false"
    networks:
      default: null
    ports:
      - 192.168.20.65:53:53/tcp
      - 192.168.20.65:53:53/udp
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ./nsd/nsd.conf:/etc/nsd/nsd.conf:ro
      - ./nsd/db.bob.house.20:/zones/db.bob.house:ro

  ntfy:
    image: binwiederhier/ntfy:latest
    cap_drop: [ ALL, ]
    command:
      - serve
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      TZ: UTC
    labels:
      traefik.http.routers.ntfy-router.entrypoints: lan
      traefik.http.routers.ntfy-router.rule: Host(`ntfy.bob.house`)
      traefik.http.routers.ntfy-router.tls: "true"
      traefik.http.services.ntfy-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/ntfy/:/var/cache/ntfy/:rw
      - ./ntfy.yml:/etc/ntfy/server.yml:ro

  nuget:
    image: bagetter/bagetter:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/nuget.env
    labels:
      traefik.http.routers.nuget-router.entrypoints: lan
      traefik.http.routers.nuget-router.rule: Host(`nuget.bob.house`)
      traefik.http.routers.nuget-router.tls: "true"
      traefik.http.services.nuget-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /tmp/, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/bagetter/:/data:rw

  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      paperless-ngx-db:
        condition: service_healthy
        required: true
      paperless-ngx-redis:
        condition: service_healthy
        required: true
      traefik:
        condition: service_healthy
        required: true
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/paperless-ngx.env
    environment:
      PAPERLESS_BIND_ADDR: 0.0.0.0
      PAPERLESS_DBHOST: paperless-ngx-db
      PAPERLESS_REDIS: redis://paperless-ngx-redis:6379
      PAPERLESS_URL: https://paperless-ngx.bob.house
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000']
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 10
    labels:
      dev.dozzle.group: paperless-ngx
      traefik.docker.network: traefik-network
      traefik.http.routers.paperless-ngx-router.entrypoints: lan
      traefik.http.routers.paperless-ngx-router.rule: Host(`paperless-ngx.bob.house`)
      traefik.http.routers.paperless-ngx-router.tls: "true"
      traefik.http.services.paperless-ngx-service.loadbalancer.server.port: "8000"
    networks:
      paperless-ngx: null
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /usr/src/paperless/data/log/, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/consume/:/usr/src/paperless/consume/:rw
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/data/:/usr/src/paperless/data/:rw
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/media/:/usr/src/paperless/media/:rw
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/export/:/usr/src/paperless/export/:rw
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/media/:/usr/src/paperless/media/:rw

  paperless-ngx-db:
    image: docker.io/library/postgres:18
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 10
    labels:
      dev.dozzle.group: paperless-ngx
      traefik.enable: "false"
    networks:
      paperless-ngx: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/db/:/var/lib/postgresql/:rw

  paperless-ngx-redis:
    image: docker.io/library/redis:8
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETPCAP, SETUID, ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 10
    labels:
      dev.dozzle.group: paperless-ngx
      traefik.enable: "false"
    networks:
      paperless-ngx: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/paperless-ngx/redis/:/data/:rw

  planka:
    image: ghcr.io/plankanban/planka:latest
    cap_drop: [ ALL, ]
    depends_on:
      planka-db:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      BASE_URL: https://planka.bob.house
      DATABASE_URL: postgresql://postgres@planka-db/planka
      DEFAULT_ADMIN_EMAIL: demo@demo.demo # Do not remove if you want to prevent this user from being edited/deleted
      DEFAULT_ADMIN_NAME: Demo Demo
      DEFAULT_ADMIN_PASSWORD: demo
      DEFAULT_ADMIN_USERNAME: demo
      OIDC_ISSUER: https://authentik.bob.house/application/o/planka/
      OIDC_SCOPES: openid profile email
      OIDC_ADMIN_ROLES: authentik Admins
      OIDC_ENFORCED: "true"
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/planka.env
    labels:
      dev.dozzle.group: planka
      traefik.docker.network: traefik-network
      traefik.http.routers.planka-router.entrypoints: lan
      traefik.http.routers.planka-router.rule: Host(`planka.bob.house`)
      traefik.http.routers.planka-router.tls: "true"
      traefik.http.services.planka-service.loadbalancer.server.port: "1337"
    networks:
      default: null
      planka: null
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/planka/data:/app/data/:rw

  planka-db:
    image: postgres:16-alpine
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d planka
      timeout: 5s
      interval: 10s
      retries: 5
    labels:
      dev.dozzle.group: planka
      traefik.enable: "false"
    networks:
      planka: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/planka/db/:/var/lib/postgresql/data/:rw

  rabbitmq:
    image: rabbitmq:management
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    env_file: [ "${REPOS_DIR:-/opt/git}/Configurations/rabbitmq.env", ]
    hostname: rabbitmq
    labels:
      traefik.http.routers.rabbitmq-router.entrypoints: lan
      traefik.http.routers.rabbitmq-router.rule: Host(`rabbitmq.bob.house`)
      traefik.http.routers.rabbitmq-router.tls: "true"
      traefik.http.services.rabbitmq-service.loadbalancer.server.port: "15672"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes: [ "${DATA_DIR:-/opt/appdata}/rabbitmq/:/var/lib/rabbitmq/:rw", ]

  readeck:
    image: codeberg.org/readeck/readeck:latest
    cap_drop: [ ALL, ]
    depends_on:
      planka-db:
        condition: service_healthy
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/readeck.env
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.readeck-router.entrypoints: lan
      traefik.http.routers.readeck-router.rule: Host(`readeck.bob.house`)
      traefik.http.routers.readeck-router.tls: "true"
      traefik.http.services.readeck-service.loadbalancer.server.port: "8000"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes: [ "${DATA_DIR:-/opt/appdata}/readeck/:/readeck/:rw", ]

  registry:
    image: registry:latest
    cap_drop: [ ALL, ]
    environment:
      OTEL_TRACES_EXPORTER: none
      REGISTRY_LOG_LEVEL: info
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/registry.env
    labels:
      dev.dozzle.group: registry
      traefik.docker.network: registry-network
      traefik.http.routers.registry-router.entrypoints: lan
      traefik.http.routers.registry-router.rule: Host(`registry.bob.house`)
      traefik.http.routers.registry-router.tls: "true"
      traefik.http.services.registry-service.loadbalancer.server.port: "5000"
    networks:
      default: null
      registry: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/registry/:/var/lib/registry/:rw

  registry-ui:
    image: joxit/docker-registry-ui:main
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, SETGID, SETUID, ]
    depends_on:
      registry:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      CATALOG_ELEMENTS_LIMIT: "1000"
      CATALOG_MAX_BRANCHES: "1"
      CATALOG_MIN_BRANCHES: "1"
      DELETE_IMAGES: "true"
      NGINX_PROXY_PASS_URL: http://registry:5000
      REGISTRY_SECURED: "false"
      REGISTRY_TITLE: Docker Registry UI
      SHOW_CATALOG_NB_TAGS: "true"
      SHOW_CONTENT_DIGEST: "true"
      SINGLE_REGISTRY: "true"
      TAGLIST_PAGE_SIZE: "100"
    labels:
      dev.dozzle.group: registry
      traefik.docker.network: traefik-network
      traefik.http.routers.registry-ui-router.entrypoints: lan
      traefik.http.routers.registry-ui-router.rule: Host(`registry-ui.bob.house`)
      traefik.http.routers.registry-ui-router.tls: "true"
      traefik.http.services.registry-ui-service.loadbalancer.server.port: "80"
    profiles: [ docker2, ]
    networks:
      registry: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  restfox:
    image: flawiddsouza/restfox:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    healthcheck:
      test: wget --spider http://localhost:4004/ || exit 1
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.restfox-router.entrypoints: lan
      traefik.http.routers.restfox-router.rule: Host(`restfox.bob.house`)
      traefik.http.routers.restfox-router.tls: "true"
      traefik.http.services.restfox-service.loadbalancer.server.port: "4004"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /root/.npm/, ]
    volumes: [ "${DATA_DIR:-/opt/appdata}/restfox/:/app/data/:rw", ]

  snipo:
    image: ghcr.io/mohamedelashri/snipo:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    env_file: [ "${REPOS_DIR:-/opt/git}/Configurations/snipo.env", ]
    environment:
      SNIPO_ENABLE_API_TOKENS: "true"
      SNIPO_ENABLE_BACKUP_RESTORE: "true"
      SNIPO_ENABLE_PUBLIC_SNIPPETS: "true"
      SNIPO_LOG_FORMAT: json
      SNIPO_LOG_LEVEL: info
      SNIPO_HOST: 0.0.0.0
      SNIPO_PORT: "8080"
      SNIPO_RATE_LIMIT_READ: "1000"
      SNIPO_RATE_LIMIT_WRITE: "500"
      SNIPO_RATE_LIMIT_ADMIN: "100"
    healthcheck:
      test: [ "CMD", "/snipo", "health", ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.snipo-router.entrypoints: lan
      traefik.http.routers.snipo-router.rule: Host(`snipo.bob.house`)
      traefik.http.routers.snipo-router.tls: "true"
      traefik.http.services.snipo-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges:true, ]
    tmpfs: [ /tmp/, ]
    user: 1000:1000
    volumes: [ "${DATA_DIR:-/opt/appdata}/snipo/:/data/:rw", ]

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      APP_TIMEZONE: UTC
      APP_URL: https://speedtest.bob.house
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: 0 */3 * * * #every 3rd hour
      SPEEDTEST_SERVERS: 2262, 3504, 20746, 48475, 57115, 59135, 62951, 67541
      PRUNE_RESULTS_OLDER_THAN: 28 #28 days
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/speedtest-tracker.env
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.speedtest-router.entrypoints: lan
      traefik.http.routers.speedtest-router.rule: Host(`speedtest.bob.house`)
      traefik.http.routers.speedtest-router.tls: "true"
      traefik.http.services.speedtest-service.loadbalancer.server.port: "80"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/speedtest/:/config/:rw

  trilium:
    image: triliumnext/trilium:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      TRILIUM_DATA_DIR: /home/node/trilium-data
    labels:
      traefik.http.routers.trilium-router.entrypoints: lan
      traefik.http.routers.trilium-router.rule: Host(`trilium.bob.house`)
      traefik.http.routers.trilium-router.tls: "true"
      traefik.http.services.trilium-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /home/node/trilium-data/backup/, /home/node/trilium-data/log/, /home/node/trilium-data/tmp/, ]
    user: "0:0"
    volumes:
      - ${DATA_DIR:-/opt/appdata}/trilium/:/home/node/trilium-data/:rw
      - /etc/localtime:/etc/localtime:ro

  trivy:
    image: aquasec/trivy:latest
    cap_drop: [ ALL, ]
    command: server
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      TRIVY_DISABLE_TELEMETRY: "true"
      TRIVY_LISTEN: 0.0.0.0:4954
    healthcheck:
      test: wget --spider http://localhost:4954/healthz || exit 1
      start_period: 30s
      interval: 30s
      retries: 3
      timeout: 5s
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.trivy-router.entrypoints: lan
      traefik.http.routers.trivy-router.rule: Host(`trivy.bob.house`)
      traefik.http.routers.trivy-router.tls: "true"
      traefik.http.services.trivy-service.loadbalancer.server.port: "4954"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /tmp/, ]
    volumes: [ "${DATA_DIR:-/opt/appdata}/trivy/:/root/.cache/trivy/:rw", ]

  vikunja:
    image: vikunja/vikunja:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
      vikunja-db:
        condition: service_healthy
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/vikunja.env
    environment:
      VIKUNJA_SERVICE_PUBLICURL: https://vikunja.bob.house/
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_DATABASE: vikunja
    labels:
      dev.dozzle.group: vikunja
      traefik.docker.network: traefik-network
      traefik.http.routers.vikunja-router.entrypoints: lan
      traefik.http.routers.vikunja-router.rule: Host(`vikunja.bob.house`)
      traefik.http.routers.vikunja-router.tls: "true"
      traefik.http.services.vikunja-service.loadbalancer.server.port: "3456"
    networks:
      traefik: null
      vikunja: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: "0"
    volumes:
      - ${DATA_DIR:-/opt/appdata}/vikunja/files/:/app/vikunja/files/:rw

  vikunja-db:
    image: postgres:18
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    env_file:
      - ${REPOS_DIR:-/opt/git}/Configurations/vikunja.env
    environment:
      POSTGRES_USER: vikunja
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 2s
      start_period: 30s
    labels:
      dev.dozzle.group: vikunja
      traefik.enable: "false"
    networks:
      vikunja: null
    profiles: [ docker2, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/vikunja/db/:/var/lib/postgresql/:rw

  zimapi:
    image: eassbhhtgu/zimapi:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.zimapi-router.entrypoints: lan
      traefik.http.routers.zimapi-router.rule: Host(`zimapi.bob.house`)
      traefik.http.routers.zimapi-router.tls: "true"
      traefik.http.services.zimapi-service.loadbalancer.server.port: "8080"
    networks:
      default: null
      traefik: null
    profiles: [ docker2, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
