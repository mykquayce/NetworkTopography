entryPoints:
  wan:
    http:
      encodedCharacters:
        allowEncodedSlash: false          # %2F - Default: true
        allowEncodedBackSlash: false      # %5C - Default: true
        allowEncodedNullCharacter: false  # %00 - Default: true
        allowEncodedSemicolon: false      # %3B - Default: true
        allowEncodedPercent: false        # %25 - Default: true
        allowEncodedQuestionMark: false   # %3F - Default: true
        allowEncodedHash: false           # %23 - Default: true
http:
  middlewares:
    method-whitelist-plugin:
      plugin:
        method-whitelist:
          Message: "Method Not Allowed"
          Methods: [ GET, OPTIONS, ]
    secure-headers:
      headers:
        accessControlAllowHeaders: [ "*", ]
        accessControlAllowMethods: [ GET, OPTIONS, ]
        accessControlAllowOriginList: [ https://www.bob.house, https://miasma.bob.house, ]
        accessControlMaxAge: 100
        addVaryHeader: true
        browserXssFilter: true
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self';
          connect-src 'self';
          img-src 'self';
          style-src 'self' 'unsafe-inline';
          object-src 'none';
          base-uri 'none';
          frame-ancestors 'none';
        contentTypeNosniff: true
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          Cross-Origin-Embedder-Policy: require-corp
          Cross-Origin-Opener-Policy: same-origin
          Cross-Origin-Resource-Policy: same-origin
          server: ""
          x-powered-by: ""
        frameDeny: true
        referrerPolicy: same-origin
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
  routers:
    glances-kayshon-router:
      entryPoints:
        - "lan"
      priority: "2"
      rule: "Host(`glances-kayshon.bob.house`)"
      service: "glances-kayshon-service"
      tls: "true"
    homeassistant-router:
      entryPoints:
        - "lan"
      rule: "Host(`homeassistant.bob.house`)"
      service: "homeassistant-service"
      tls: "true"
    iot-switch-router:
      entryPoints:
        - "lan"
      rule: "Host(`iot-switch.bob.house`)"
      service: "iot-switch-service"
      tls: "true"
    kopia-kayshon-router:
      entryPoints:
        - "lan"
      priority: "2"
      rule: "Host(`kopia-kayshon.bob.house`)"
      service: "kopia-kayshon-service"
      tls: "true"
    leafwiki-router:
      entryPoints:
        - "lan"
      rule: "Host(`www.bob.house`)"
      service: "leafwiki-service"
      tls: "true"
    main-router-router:
      entryPoints:
        - "lan"
      rule: "Host(`main-router.bob.house`)"
      service: "main-router-service"
      tls: "true"
    main-switch-router:
      entryPoints:
        - "lan"
      rule: "Host(`main-switch.bob.house`)"
      service: "main-switch-service"
      tls: "true"
    miasma-router:
      entryPoints:
        - "lan"
      rule: "Host(`miasma.bob.house`)"
      service: "miasma-service"
      tls: "true"
    traefik-kayshon-router:
      entryPoints:
        - "lan"
      priority: "2"
      rule: "Host(`traefik-kayshon.bob.house`)"
      service: "traefik-kayshon-service"
      tls: "true"
  services:
    glances-kayshon-service:
      loadBalancer:
        servers:
        - url: "https://kayshon.bob.house"
    homeassistant-service:
      loadBalancer:
        servers:
        - url: "http://192.168.20.80:8123"
    iot-switch-service:
      loadBalancer:
        servers:
        - url: "http://192.168.20.5"
    kopia-kayshon-service:
      loadBalancer:
        servers:
        - url: "https://kayshon.bob.house"
    leafwiki-service:
      loadBalancer:
        servers:
        - url: "https://kayshon.bob.house"
    main-router-service:
      loadBalancer:
        servers:
        - url: "http://192.168.1.1"
    main-switch-service:
      loadBalancer:
        servers:
        - url: "http://192.168.1.5"
    miasma-service:
      loadBalancer:
        servers:
        - url: "https://kayshon.bob.house"
    traefik-kayshon-service:
      loadBalancer:
        servers:
        - url: "https://kayshon.bob.house"
