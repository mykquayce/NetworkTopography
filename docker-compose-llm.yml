services:
  ollama:
    image: ollama/ollama:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.ollama-router.entrypoints: lan
      traefik.http.routers.ollama-router.rule: Host(`ollama.bob.house`)
      traefik.http.routers.ollama-router.tls: "true"
      traefik.http.services.ollama-service.loadbalancer.server.port: "11434"
    networks:
      ollama: null
      traefik: null
    profiles: [ llm, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/ollama/:/root/.ollama/:rw

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    cap_drop: [ ALL, ]
    depends_on:
      ollama:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    env_file:
      - ${REPOS_DIR:-/opt/repos}/Configurations/open-webui.env
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.open-webui-router.entrypoints: lan
      traefik.http.routers.open-webui-router.rule: Host(`open-webui.bob.house`)
      traefik.http.routers.open-webui-router.tls: "true"
      traefik.http.services.open-webui-service.loadbalancer.server.port: "8080"
    networks:
      ollama: null
      traefik: null
    profiles: [ llm, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/open-webui/:/app/backend/data/:rw

  speakr:
    image: learnedmachine/speakr:latest
    cap_drop: [ ALL, ]
    depends_on:
      ollama:
        condition: service_started
      traefik:
        condition: service_healthy
      whisper-asr:
        condition: service_started
    env_file:
      - ${REPOS_DIR:-/opt/repos}/Configurations/speakr.env
    environment:
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: jenegol581@codgal.com
      ALLOW_REGISTRATION: "false"
      ASR_BASE_URL: http://whisper-asr:9000
      ASR_DIARIZE: "true"
      ASR_RETURN_SPEAKER_EMBEDDINGS: "true"
      AUDIO_COMPRESS_UPLOADS: "true"
      AUDIO_CODEC: mp3
      AUDIO_BITRATE: 128k
      CHAT_MAX_TOKENS: "5000"
      CHUNK_LIMIT: 20MB
      CHUNK_OVERLAP_SECONDS: "3"
      ENABLE_INQUIRE_MODE: "false"
      ENABLE_AUTO_PROCESSING: "false"
      ENABLE_AUTO_EXPORT: "false"
      ENABLE_AUTO_DELETION: "false"
      ENABLE_INTERNAL_SHARING: "false"
      ENABLE_PUBLIC_SHARING: "true"
      GPT5_REASONING_EFFORT: medium
      GPT5_VERBOSITY: medium
      JOB_MAX_RETRIES: "3"
      JOB_QUEUE_WORKERS: "2"
      LOG_LEVEL: ERROR
      SQLALCHEMY_DATABASE_URI: sqlite:////data/instance/transcriptions.db
      SUMMARY_QUEUE_WORKERS: "2"
      SUMMARY_MAX_TOKENS: "8000"
      TEXT_MODEL_BASE_URL: http://open-webui:8080/api
      TEXT_MODEL_NAME: llama3-chatqa:8b
      TIMEZONE: "Etc/UTC"
      TRANSCRIPTION_BASE_URL: http://open-webui:8080/api
      TRANSCRIPTION_MODEL: llama3-chatqa:8b
      UPLOAD_FOLDER: /data/uploads
      USERS_CAN_DELETE: "true"
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.speakr-router.entrypoints: lan
      traefik.http.routers.speakr-router.rule: Host(`speakr.bob.house`)
      traefik.http.routers.speakr-router.tls: "true"
      traefik.http.services.speakr-service.loadbalancer.server.port: "8899"
    networks:
      ollama: null
      traefik: null
    profiles: [ llm, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/speakr/uploads/:/data/uploads/:rw
      - ${DATA_DIR:-/opt/appdata}/speakr/instance/:/data/instance/:rw

  whisper-asr:
    image: onerahmet/openai-whisper-asr-webservice:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      ASR_DEVICE: cpu
      ASR_ENGINE: openai_whisper # openai_whisper, faster_whisper, whisperx
      ASR_MODEL: medium # tiny, base, small, medium, large-v1, large-v2, large-v3, large-v3-turbo
      ASR_MODEL_PATH: /data/whisper
    labels:
      traefik.docker.network: traefik-network
      traefik.http.routers.whisper-asr-router.entrypoints: lan
      traefik.http.routers.whisper-asr-router.rule: Host(`whisper-asr.bob.house`)
      traefik.http.routers.whisper-asr-router.tls: "true"
      traefik.http.services.whisper-asr-service.loadbalancer.server.port: "9000"
    networks:
      ollama: null
      traefik: null
    profiles: [ llm, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ${DATA_DIR:-/opt/appdata}/whisper-asr/cache/:/root/.cache/:rw
      - ${DATA_DIR:-/opt/appdata}/whisper-asr/data/:/data/whisper/:rw
