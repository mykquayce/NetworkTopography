schedule: CRON_TZ=Etc/UTC 0 4 * * *

ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts

steps:
  - id: freeman
    run: rsync --archive --delete --partial --progress root@freeman.bob.house:/repository/ /mnt/md2/backup/freeman/
  - id: kayshon
    run: rsync --archive --delete --partial --progress root@kayshon.bob.house:/repository/ /mnt/md2/backup/kayshon/
  - id: ransom
    run: rsync --archive --delete --partial --progress root@ransom.bob.house:/repository/ /mnt/md2/backup/ransom/
  - id: shaxs
    run: rsync --archive --delete --partial --progress root@shaxs.bob.house:/repository/ /mnt/md2/backup/shaxs/
  - id: tana
    run: rsync --archive --delete --partial --progress /repository/ /mnt/md2/backup/tana/
  - id: cctv
    run: rsync --archive --delete --partial --progress root@shaxs.bob.house:/recordings/ /mnt/md2/backup/cctv/
    depends: shaxs
  - id: get_disk_usage
    run: df --human-readable --print-type /mnt/md2/
    depends: [freeman, kayshon, ransom, shaxs, tana, cctv]
    output: USAGE
  - id: notify
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: $USAGE
      headers:
        Content-Type: text/plain
        Tags: timer_clock,open_file_folder,file_cabinet
        Title: "backup completed"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    depends: get_disk_usage
