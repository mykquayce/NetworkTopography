schedule: CRON_TZ=Etc/UTC 0 2 * * *

ssh:
  user: root
  host: ransom.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts

steps:
  - id: inspect_image
    run: |
      docker image inspect --format '{{.Created}}' ransom-nsd01:latest \
        | { read dt; date --date "$dt" --iso-8601=ns --universal; }
    output:
      image_date:
        from: stdout
  - id: pull_base_image
    run: docker pull alpine:latest
  - id: inspect_base_image
    run: |
      docker image inspect --format '{{.Created}}' alpine:latest \
        | { read dt; date --date "$dt" --iso-8601=ns --universal; }
    depends: pull_base_image
    output:
      base_image_date:
        from: stdout
  - id: test
    description: is the base image newer than the current image?
    run: |
      if [ '"${inspct_base_image.output.base_image_daete}"' \> '"${inspect_image.output.image_date}"' ]
      then
        printf "out-of-date"
      else
        printf "up-to-date"
      fi
    depends: [inspect_image,inspect_base_image]
    output:
      result:
        from: stdout
  - name: rebuild
    run: |
      docker compose --file /opt/git/stacks/ransom/docker-compose.yml build nsd01 nsd20 --pull
      docker compose --file /opt/git/stacks/ransom/docker-compose.yml up nsd01 nsd20 --detach
    preconditions:
      - condition: "${test.output.result}"
        expected: "out-of-date"
    depends: test
