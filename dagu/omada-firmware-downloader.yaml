schedule: CRON_TZ=Etc/UTC 0 2 * * *
retry_policy:
  limit: 0
steps:
  - id: loop
    action: dag.run
    parallel:
      items:
        - "https://support.omadanetworks.com/us/product/sg2210mp/v4.20/?resourceType=download"
        - "https://support.omadanetworks.com/us/product/er7206/v2.20/?resourceType=download"
    with:
      dag: device-processor
      params: "WEBPAGE_URI=${ITEM}"
---
name: device-processor
params:
  - WEBPAGE_URI: ""
retry_policy:
  limit: 0
steps:
  - id: mktemp
    run: mktemp --quiet --suffix .html
    output:
      path:
        from: stdout
        decode: text
  - id: download_webpage
    action: http.request
    with:
      method: GET
      url: "${WEBPAGE_URI}"
      headers:
        User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405
      silent: true
    stdout: "${mktemp.output.path}"
    depends: mktemp
  - id: find_uris
    run: |
      cat "${mktemp.output.path}" \
      | grep --extended-regexp --only-matching 'https://static.tp-link.com/upload/firmware/.{,80}\.zip' \
      | sort \
      | uniq \
      | sed 's/ /%20/g' \
      | jq --raw-input . \
      | jq --slurp .
    depends: download_webpage
    output:
      uris:
        from: stdout
        decode: json
  - id: get_files
    action: dag.run
    parallel:
      items: "${find_uris.output.uris}"
      max_concurrent: 1
    with:
      dag: file-processor
      params: "SOURCE_FILE_URI=${ITEM}"
    preconditions:
      - condition: "${find_uris.output.uris}"
        expected: "[]"
        negate: true
    depends: find_uris
  - id: clean_up
    run: rm --force "${mktemp.output.path}"
    depends: find_uris
---
name: file-processor
params:
  - SOURCE_FILE_URI: ""
retry_policy:
  limit: 0
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - id: get_filename
    run: |
      printf "%s" "${SOURCE_FILE_URI}" \
        | tr / \\n \
        | tail --lines 1
    output:
      filename:
        from: stdout
        decode: text
  - id: build_target_file_path
    run: printf "/mnt/md1/downloads/firmware/%s" "${get_filename.output.filename}"
    depends: get_filename
    output:
      path:
        from: stdout
        decode: text
  - id: count_target_files
    run: |
      ( ls -1U --literal "${build_target_file_path.output.path}" 2>/dev/null || true ) \
        | grep --count ^ || true
    depends: build_target_file_path
    output:
      count:
        from: stdout
        decode: text
  - id: download
    run: |
      curl \
        --header 'User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405' \
        --output "${build_target_file_path.output.path}" \
        --silent \
        --url "${SOURCE_FILE_URI}" \
        --verbose
    preconditions:
      - condition: "${count_target_files.output.count}"
        expected: "0"
    depends: count_target_files
  - id: notify
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: "${get_filename.output.filename}"
      headers:
        Content-Type: text/plain
        Priority: high
        Tags: desktop_computer,+1
        Title: "downloaded omada firmware"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    depends: download
