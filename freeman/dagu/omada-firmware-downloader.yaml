schedule: CRON_TZ=Etc/UTC 0 2 * * *
steps:
  - id: loop
    call: worker-processor
    parallel:
      - "https://support.omadanetworks.com/us/product/sg2210mp/v4.20/?resourceType=download"
      - "https://support.omadanetworks.com/us/product/er7206/v2.20/?resourceType=download"
    params: "WEBPAGE-URI=${ITEM}"
---
name: worker-processor
params:
  - WEBPAGE-URI: ""
steps:
  - id: mktemp
    run: mktemp --quiet --suffix .html
    output: TMP_FILE
  - id: download_webpage
    type: http
    command: "GET ${WEBPAGE-URI}"
    config:
      headers:
        User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405
      silent: true
    retry_policy:
      limit: 3
      interval_sec: 5
    stdout: "${TMP_FILE}"
    depends: mktemp
  - id: find_uris
    run: |
      cat "${TMP_FILE}" \
      | grep --extended-regexp --only-matching 'https://static.tp-link.com/upload/firmware/.{,80}\.zip' \
      | sort \
      | uniq \
      | sed 's/ /%20/g' \
      | jq --raw-input . \
      | jq --slurp .
    depends: download_webpage
    output: FILE_URIS
  - id: cleanup
    run: rm --force "${TMP_FILE}"
    depends: find_uris
  - id: count
    type: jq
    command: . | length
    script: $FILE_URIS
    depends: find_uris
    output: COUNT
  - id: router
    action: router.route
    with:
      value: "${COUNT}"
      routes:
        "1": [one_file]
        "re:.*": [many_files]
    preconditions:
      - command: "${COUNT}"
        expected: "0"
        negate: true
    depends: count
  - id: one_file
    call: iterator-processor
    params: "SOURCE_FILE_URI=${ITEM}"
    depends: router
  - id: many_files
    call: iterator-processor
    parallel:
      items: ${FILE_URIS}
    params: "SOURCE_FILE_URI=${ITEM}"
    depends: router
---
name: iterator-processor
params:
  - SOURCE_FILE_URI: ""
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - id: get_filename
    run: |
      echo -n "${SOURCE_FILE_URI}" \
      | rev \
      | cut --delimiter '/' --fields 1 --only-delimited \
      | rev
    output: FILENAME
  - id: build_target_file_path
    run: printf "/mnt/md1/downloads/firmware/%s" "${FILENAME}"
    depends: get_filename
    output: TARGET_FILE_PATH
  - id: count_target_files
    run: |
      ( ls -1U --literal "${TARGET_FILE_PATH}" 2>/dev/null || true ) \
        | grep --count ^ || true
    depends: build_target_file_path
    output: TARGET_COUNT
  - id: router
    action: router.route
    with:
      value: ${TARGET_COUNT}
      routes:
        "0": [download, notify]
    depends: count_target_files
  - id: download
    run: |
      curl \
        --header 'User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405' \
        --output "${TARGET_FILE_PATH}" \
        --silent \
        --url "${SOURCE_FILE_URI}" \
        --verbose
  - id: notify
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: "${FILENAME}"
      headers:
        Content-Type: text/plain
        Priority: high
        Tags: desktop_computer,+1
        Title: "downloaded omada firmware"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    depends: download
