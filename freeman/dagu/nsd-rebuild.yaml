schedule: CRON_TZ=Etc/UTC 0 2 * * *

ssh:
  user: root
  host: ransom.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts

steps:
  - name: docker pull
    description: pull base image
    command: docker pull alpine:latest
  - name: docker inspect1
    description: get base image created date
    command: |
      docker image inspect --format '{{.Created}}' alpine:latest \
        | { read dt; date --date "$dt" --iso-8601=ns --universal; }
    output: BASE_IMAGE_DATE
  - name: docker inspect2
    description: get image created date
    command: |
      docker image inspect --format '{{.Created}}' ransom-nsd01:latest \
        | { read dt; date --date "$dt" --iso-8601=ns --universal; }
    output: IMAGE_DATE
  - name: test
    description: is the base image newer than the current image?
    command: if [ '"${BASE_IMAGE_DATE}"' \> '"${IMAGE_DATE}"' ]; then echo 1; else echo 2; fi
    output: RESULT
  - name: rebuild
    command: |
      docker compose --file /root/NetworkTopography/ransom/docker-compose.yml build nsd01 nsd20 --pull
      docker compose --file /root/NetworkTopography/ransom/docker-compose.yml up nsd01 nsd20 --detach
    preconditions:
      - condition: "${RESULT}"
        expected: "1"
