schedule: CRON_TZ=Etc/UTC 0,30 * * * *
retry_policy:
  limit: 0
steps:
  - id: get_request
    action: dag.run
    with:
      dag: request_processor
      params:
        METHOD: "GET"
    output:
      body:
        from: stdout
        decode: json
        select: .outputValues.body
      headers:
        from: stdout
        decode: json
        select: .outputValues.headers
  - id: post_request
    action: dag.run
    with:
      dag: request_processor
      params:
        METHOD: "POST"
    output:
      body:
        from: stdout
        decode: json
        select: .outputValues.body
      headers:
        from: stdout
        decode: json
        select: .outputValues.headers
    depends: get_request
    preconditions:
      - condition: "${get_request.output.headers}"
        expected: "re:^< HTTP/2 200"
  - id: get_notification
    action: dag.run
    with:
      dag: notification_processor
      params:
        MESSAGE: "get_body:\n${get_request.output.body}\n\nget_headers:\n${get_request.output.headers}"
    depends: get_request
    preconditions:
      - condition: "${get_request.output.headers}"
        expected: "re:^< HTTP/2 200"
        negate: true
  - id: post_notification
    action: dag.run
    with:
      dag: notification_processor
      params:
        MESSAGE: "post_body:\n${post_request.output.body}\n\nget_headers:\n${post_request.output.headers}"
    depends: post_request
    preconditions:
      - condition: "${post_request.output.headers}"
        expected: "re:^< HTTP/2 405"
        negate: true
---
name: request_processor
params:
  - METHOD: ""
retry_policy:
  limit: 0
ssh:
  user: root
  host: freeman.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - id: request
    run: |
      curl \
        --header 'text/html; charset=utf-8' \
        --header 'User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405' \
        --proxy 'http://squid.bob.house:3128' \
        --request "${METHOD}" \
        --silent \
        --url 'https://www.bob.house/homepage' \
        --verbose
    preconditions:
      - condition: "${METHOD}"
        expected: ""
        negate: true
    output:
      body:
        from: stdout
      headers:
        from: stderr
---
name: notification_processor
params:
  - MESSAGE: ""
retry_policy:
  limit: 0
steps:
  - id: notify
    action: http.request
    with:
      method: POST
      url: https://ntfy.bob.house/software
      body: "${MESSAGE}"
      headers:
        Content-Type: text/plain
        Priority: high
        Tags: earth_africa,desktop_computer
        Title: "public-facing website test failed"
        User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405
    preconditions:
      - condition: "${MESSAGE}"
        expected: ""
        negate: true
