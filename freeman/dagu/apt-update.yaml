schedule: CRON_TZ=Etc/UTC 0 2 * * *

steps:
  - call: update-processor
    name: update
    parallel:
      items: [freeman.bob.house, ransom.bob.house, shaxs.bob.house, tana.bob.house]
      max_concurrent: 1
    params: "SERVER=${ITEM}"
    output: SUMMARY
  - name: format
    type: jq
    command: .results[] | {params,summary:.outputs.UPDATES} | {(.params[7:]):.summary}
    script: $SUMMARY
    output: FORMATTED
  - name: ntfy
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: $FORMATTED
      headers:
        Content-Type: text/plain
        Priority: high
        Tags: computer,triangular_flag_on_post
        Title: "apt updates"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
---
name: update-processor
params:
  - SERVER:
ssh:
  user: root
  host: $SERVER
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - name: update
    command: apt update -qq
    continue_on:
      exit_code: [0]
      output: "re:^[0-9]+ packages can be upgraded"
      mark_success: true
    timeout_sec: 60
  - name: list
    command: apt list -qq --upgradable
    output: UPDATES
    timeout_sec: 60
