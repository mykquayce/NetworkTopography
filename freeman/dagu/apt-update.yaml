schedule: CRON_TZ=Etc/UTC 0 2 * * *
retry_policy:
  limit: 0
steps:
  - id: update
    action: dag.run
    parallel:
      items:
        - freeman.bob.house
        - kayshon.bob.house
        - ransom.bob.house
        - shaxs.bob.house
        - tana.bob.house
    with:
      dag: update-processor
      params: "SERVER=${ITEM}"
    output:
      summary:
        from: stdout
        decode: json
        select: "[ .results[].outputValues | select(.upgradable) | {(.server_name):(.upgradable | fromjson)} ]"
  - id: format
    run: |
      printf "${update.output.summary}" \
        | jq --ascii-output --monochrome-output --sort-keys \
        | xargs --null printf '```\n%s```'
    depends: update
    output:
      formatted:
        from: stdout
        decode: text
  - id: ntfy
    action: http.request
    with:
      method: POST
      url: https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
      body: "${format.output.formatted}"
      headers:
        Accept: applicaton/json
        Content-Type: text/markdown
        Markdown: yes
        Priority: high
        Tags: computer,triangular_flag_on_post
        Title: apt updates
        User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405
      silent: false
      format: json
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    depends: format
---
name: update-processor
retry_policy:
  limit: 0
params:
  - SERVER: ""
steps:
  - id: apt_update
    action: ssh.run
    with:
      user: root
      host: "${SERVER}"
      key: /run/secrets/id_rsa
      known_host_file: /run/secrets/known_hosts
      timeout_sec: 60s
      command: ( apt update -qq 2>/dev/nul ) || true
  - id: apt_list_upgradable
    action: ssh.run
    with:
      user: root
      host: "${SERVER}"
      key: /run/secrets/id_rsa
      known_host_file: /run/secrets/known_hosts
      timeout_sec: 60s
      command: |
        ( apt list -qq --upgradable 2>/dev/nul || true ) \
          | jq --raw-input \
          | jq --compact-output --slurp
    preconditions:
      - condition: "${apt_update.output.state}"
        expected: "All packages are up to date."
        negate: true
    depends: apt_update
    output:
      upgradable:
        from: stdout
        decode: json
  - id: publish_result
    action: outputs.write
    with:
      values:
        server_name: "${SERVER}"
        upgradable: "${apt_list_upgradable.output.upgradable}"
    depends: apt_list_upgradable
