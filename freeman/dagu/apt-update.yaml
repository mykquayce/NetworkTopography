schedule: CRON_TZ=Etc/UTC 0 2 * * *
steps:
  - id: update
    action: dag.run
    parallel:
      items:
        - freeman.bob.house
        - ransom.bob.house
        - shaxs.bob.house
        - tana.bob.house
    with:
      dag: update-processor
      params: "SERVER=${ITEM}"
    output:
      summary:
        from: stdout
        decode: json
        select: "[.results[].outputValues | select(.upgradable) | {(.server_name):.upgradable}] | add"
  - name: ntfy
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: "${update.output.summary}"
      headers:
        Content-Type: text/plain
        Priority: high
        Tags: computer,triangular_flag_on_post
        Title: "apt updates"
      silent: false
      format: json
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    preconditions:
      - condition: "${update.output.summary}"
        expected: "{}"
        negate: true
    depends: update
---
name: update-processor
params:
  - SERVER: ""
ssh:
  user: root
  host: $SERVER
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - id: print_server_name
    run: printf '%s' "${SERVER}"
    stdout:
      outputs: server_name
  - id: apt_update
    run: ( apt update -qq 2>/dev/nul ) || true
    timeout_sec: 60
    output:
      count:
        from: stdout
    stdout:
      outputs: count
  - id: apt_list_upgradable
    run: ( apt list -qq --upgradable 2>/dev/nul ) || true
    timeout_sec: 60
    preconditions:
      - condition: "${apt_update.output.count}"
        expected: "All packages are up to date."
        negate: true
    depends: apt_update
    stdout:
      outputs: upgradable
