schedule: CRON_TZ=Etc/UTC 0 2 * * *

steps:
  - call: update-processor
    name: tana
    parallel:
      items: [ransom.lan, shaxs.lan, tana.lan]
      max_concurrent: 1
    params: "SERVER=${ITEM}"
    output: SUMMARY
  - name: format
    type: jq
    preconditions:
      - condition: $SUMMARY
        expected: ""
        negate: true
    command: .results[] | {params,summary:.outputs.UPDATES} | {(.params[7:]):.summary}
    script: $SUMMARY
    output: FORMATTED
  - name: ntfy
    type: http
    preconditions:
      - condition: $FORMATTED
        expected: ""
        negate: true
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: $FORMATTED
      headers:
        Content-Type: text/plain
        Priority: high
        Tags: computer,triangular_flag_on_post
        Title: "apt updates"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
---
name: update-processor
params:
  - SERVER:
ssh:
  user: root
  host: $SERVER
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - name: update
    preconditions:
      - condition: $SERVER
        expected: ""
        negate: true
    command:
      - apt update -qq
      - apt list --upgradable -qq
    output: UPDATES
    timeout_sec: 60
