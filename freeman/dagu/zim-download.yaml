schedule: CRON_TZ=Etc/UTC 0 1 * * *
steps:
  - id: get_details
    parallel:
      items:
        [
          {
            "baseAddress": "https://download.kiwix.org/zim/gutenberg/",
            "regexPattern": "gutenberg_en_all_[0-9]{4}-[0-9]{2}.zim",
          },
          {
            "baseAddress": "https://download.kiwix.org/zim/wikibooks/",
            "regexPattern": "wikibooks_en_all_maxi_[0-9]{4}-[0-9]{2}.zim",
          },
          {
            "baseAddress": "https://download.kiwix.org/zim/wikipedia/",
            "regexPattern": "wikipedia_en_all_maxi_[0-9]{4}-[0-9]{2}.zim",
          },
          {
            "baseAddress": "https://download.kiwix.org/zim/wikiquote/",
            "regexPattern": "wikiquote_en_all_maxi_[0-9]{4}-[0-9]{2}.zim",
          },
          {
            "baseAddress": "https://download.kiwix.org/zim/wiktionary/",
            "regexPattern": "wiktionary_en_all_nopic_[0-9]{4}-[0-9]{2}.zim",
          },
        ]
    call: get_details_processor
    params: "ZIM=${ITEM}"
    output: DETAILS
  - id: filter
    type: jq
    command: '[.[] | select(.TARGET_COUNT == "0") | {PATH,URI}]'
    script: ${DETAILS.outputs}
    output: FILTERED
    depends: get_details
  - id: do_work
    call: do_work_processor
    parallel:
      items: "${FILTERED}"
    params: "ZIM=${ITEM}"
    preconditions:
      - condition: "${FILTERED}"
        expected: "[]"
        negate: true
    depends: filter
---
name: get_details_processor
params:
  - ZIM: ""
steps:
  - id: mktemp
    description: make a temp file for the html
    run: mktemp --quiet --suffix .html
    output: TMP_FILE
  - id: curl
    type: http
    command: "GET ${ZIM.baseAddress}"
    config:
      headers:
        User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405
      silent: true
    retry_policy:
      limit: 3
      interval_sec: 5
    stdout: "${TMP_FILE}"
    depends: mktemp
  - id: get_filename
    run: |
      cat "${TMP_FILE}" \
        | grep --extended-regexp --only-matching "${ZIM.regexPattern}" \
        | sort \
        | uniq \
        | tail --lines 1
    output: FILENAME
    depends: curl
  - id: cleanup
    run: rm --force "${TMP_FILE}"
    depends: get_filename
  - id: get_uri
    description: get the uri
    run: printf "%s%s" ${ZIM.baseAddress} "${FILENAME}"
    output: URI
    depends: get_filename
  - id: get_path
    run: printf "/mnt/md1/downloads/zim/%s" "${FILENAME}"
    output: PATH
    depends: get_filename
  - id: check_target_exists
    type: ssh
    command: (ls -1U "${PATH}" 2>/dev/null || true) | grep --count ^ || true
    with:
      user: root
      host: tana.bob.house
      key: /run/secrets/id_rsa
      known_host_file: /run/secrets/known_hosts
    output: TARGET_COUNT
    depends: get_path
---
name: do_work_processor
params:
  - ZIM: ""
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - id: shutdown
    description: shutdown the kiwix docker container
    command: docker compose --file ~/NetworkTopography/tana/docker-compose.yml down kiwix
  - id: download
    call: download_processor
    parallel:
      items: "${ZIM}"
      max_concurrent: 1
    params: "ZIM=${ITEM}"
  - id: restart
    description: restart the kiwix docker container
    command: docker compose --file ~/NetworkTopography/tana/docker-compose.yml up --detach kiwix
    depends: [shutdown, download]
---
name: download_processor
params:
  - ZIM: ""
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - id: download_zim
    command: |
      curl \
        --header 'User-Agent: Mozilla/5.0 (iPad; U; CPU OS 3_2_1 like Mac OS X; en-us) AppleWebKit/531.21.10 (KHTML, like Gecko) Mobile/7B405' \
        --location \
        --output "${ZIM.PATH}" \
        --silent \
        --url "${ZIM.URI}" \
        --verbose
  - id: get_filename
    command: basename --zero "${ZIM.PATH}"
    output: FILENAME
  - id: cleanup
    script: |
      #! /bin/bash
      p=$( printf "%s" "${FILENAME}" | cut --delimiter _ --fields 1 )
      find /mnt/md1/downloads/zim/ -name "$p*" -type f \
        | sort \
        | head --lines -1 \
        | xargs --no-run-if-empty rm
    depends: [download_zim, get_filename]
  - id: notify
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: "${FILENAME}"
      headers:
        Content-Type: text/plain
        Tags: floppy_disk,page_facing_up,microscope
        Title: "zim file downloaded"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    depends: [download_zim,get_filename]
