schedule: CRON_TZ=Etc/UTC 15 */3 * * *

ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts

steps:
  - name: freeman
    command: rsync --archive --delete --partial --progress root@freeman.bob.house:/repository/ /mnt/md2/backup/freeman/
  - name: ransom
    command: rsync --archive --delete --partial --progress root@ransom.bob.house:/repository/ /mnt/md2/backup/ransom/
  - name: shaxs
    command: rsync --archive --delete --partial --progress root@shaxs.bob.house:/repository/ /mnt/md2/backup/shaxs/
  - name: tana
    command: rsync --archive --delete --partial --progress /repository/ /mnt/md2/backup/tana/
  - name: cctv
    command: rsync --archive --delete --partial --progress root@shaxs.bob.house:/root/.frigate/media/recordings/ /mnt/md2/backup/cctv/
  - name: get disk usage
    command: df --human-readable --print-type /mnt/md2/
    output: USAGE
  - name: notify
    command: |
      curl --data "${USAGE}" \
        --header 'Tags: timer_clock,open_file_folder,file_cabinet' \
        --header 'Title: backup completed' \
        --url 'https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e'
