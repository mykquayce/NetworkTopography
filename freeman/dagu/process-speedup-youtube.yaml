schedule: CRON_TZ=Etc/UTC 5,15,25,35,45,55 * * * *
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
steps:
  - name: mktemp
    description: make a temporary file to hold the list of files to process (new-line delimited)
    command: mktemp --quiet
    output: SOURCE_FILES_FILE
  - name: ls
    description: get a list of files to process
    command: |
      ( ls -1U --literal /mnt/md1/downloads/pinchflat/shrink/*/*.mp4 2>/dev/null || true ) \
        > ${SOURCE_FILES_FILE}
  - name: count
    description: count the files
    command: (cat "${SOURCE_FILES_FILE}" | grep --count ^) || true
    output: SOURCE_COUNT
  - name: indices
    description: build a list of indicies
    command: seq 1 "${SOURCE_COUNT}"
    output: INDICES
  - name: one-file
    call: file-processor
    params: "SOURCE_FILES_FILE=${SOURCE_FILES_FILE} INDEX=1"
    preconditions:
      - command: "${SOURCE_COUNT}"
        expected: "1"
    continue_on: skipped
  - name: multiple
    call: file-processor
    parallel:
      items: "${INDICES}"
      max_concurrent: 1
    params: "SOURCE_FILES_FILE=${SOURCE_FILES_FILE} INDEX=${ITEM}"
    preconditions:
      - command: "${SOURCE_COUNT}"
        expected: "0"
        negate: true
      - command: "${SOURCE_COUNT}"
        expected: "1"
        negate: true
    continue_on: skipped
  - name: rm
    description: cleanup
    command: rm --force "${SOURCE_FILES_FILE}"
---
name: file-processor
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
params:
  - SOURCE_FILES_FILE: ""
  - INDEX: ""
steps:
  - name: mktemp1
    description: make the tmp file to hold the source file path
    command: mktemp --quiet
    output: SOURCE_FILE_FILE
  - name: mktemp2
    description: make the tmp file to hold the channel name
    command: mktemp --quiet
    output: CHANNEL_NAME_FILE
  - name: mktemp3
    description: make the tmp file to hold the video name
    command: mktemp --quiet
    output: VIDEO_NAME_FILE
  - name: mktemp4
    description: make the tmp file to hold the target file path
    command: mktemp --quiet
    output: TARGET_FILE_FILE
  - id: variables
    description: populate the variables
    command: |
      (sed --quiet "${INDEX}p" < "${SOURCE_FILES_FILE}") > "${SOURCE_FILE_FILE}"
      (cat "${SOURCE_FILE_FILE}" | sed --quiet --regexp-extended 's/^.+\/(.+?)\/(.+?)$/\1/p') > "${CHANNEL_NAME_FILE}"
      (cat "${SOURCE_FILE_FILE}" | sed --quiet --regexp-extended 's/^.+\/(.+?)\/(.+?)$/\2/p') > "${VIDEO_NAME_FILE}"
      echo -n "/mnt/md1/youtube/$(cat ${CHANNEL_NAME_FILE})/$(cat ${VIDEO_NAME_FILE})" > "${TARGET_FILE_FILE}"
  - name: count
    description: count files at the target
    command: |
      ( ls -1U --literal "$(cat ${TARGET_FILE_FILE})" 2>/dev/null || true ) \
        | grep --count ^ || true
    output: TARGET_COUNT
  - call: worker
    params: "SOURCE_FILE_FILE=${SOURCE_FILE_FILE} CHANNEL_NAME_FILE=${CHANNEL_NAME_FILE} VIDEO_NAME_FILE=${VIDEO_NAME_FILE} TARGET_FILE_FILE=${TARGET_FILE_FILE}"
    preconditions:
      - command: "${TARGET_COUNT}"
        expected: "0"
    continue_on: skipped
  - id: rm
    name: cleanup
    command: |
      rm --force "${SOURCE_FILE_FILE}"
      rm --force "${CHANNEL_NAME_FILE}"
      rm --force "${VIDEO_NAME_FILE}"
      rm --force "${TARGET_FILE_FILE}"
---
name: worker
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
params:
  - SOURCE_FILE_FILE: ""
  - CHANNEL_NAME_FILE: ""
  - VIDEO_NAME_FILE: ""
  - TARGET_FILE_FILE: ""
steps:
  - name: echo
    command: echo "processing $(cat ${SOURCE_FILE_FILE}) into $(cat ${TARGET_FILE_FILE})"
  - name: mktemp1
    description: make the tmp file to hold the metadata
    command: mktemp --quiet
    output: METADATA_FILE
  - name: mktemp2
    description: make the tmp file to hold the adjusted metadata
    command: mktemp --quiet
    output: ADJUSTED_METADATA_FILE
  - name: mktemp3
    description: make the tmp file to hold the shrunk file
    command: mktemp --quiet --suffix .mp4
    output: SHRUNK_FILE
  - name: mkdir
    description: create target directory
    command: |
      mkdir --parents --verbose "/mnt/md1/youtube/$(cat ${CHANNEL_NAME_FILE})/"
  - name: get chapters
    description: extract metadata
    command: ffmpeg -hide_banner -y -i "$(cat ${SOURCE_FILE_FILE})" -f ffmetadata "${METADATA_FILE}"
  - name: adjust chapters
    command: |
      awk -F= '{ if($1~/^(END|START)$/) {$2=($2*10)/13; printf "%s=%d\n", $1, $2} else {print $0} }' "${METADATA_FILE}" \
        > "${ADJUSTED_METADATA_FILE}"
  - name: shrink
    command: |
      ffmpeg -hide_banner -y -i "$(cat ${SOURCE_FILE_FILE})" \
        -map 0:v:0 -filter:v:0 fps=fps=8,setpts=PTS/1.3 \
        -map 0:a:0 -filter:a:0 atempo=1.3 \
        -map 0:v:1 -codec:v:1 copy \
        -map_chapters -1 \
        "${SHRUNK_FILE}"
  - name: combine
    command: |
      ffmpeg -hide_banner -y \
        -i "${SHRUNK_FILE}" -i "${ADJUSTED_METADATA_FILE}" \
        -map 0 -map_metadata 1 -codec copy \
        "$(cat ${TARGET_FILE_FILE})"
  - name: notify1
    description: get variables for the notify step
    command: cat "${CHANNEL_NAME_FILE}"
    output: CHANNEL_NAME
  - name: notify2
    description: get variables for the notify step
    command: cat "${VIDEO_NAME_FILE}"
    output: VIDEO_NAME
  - name: notify3
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: $VIDEO_NAME
      headers:
        Content-Type: text/plain
        Tags: tv,+1
        Title: "new ${CHANNEL_NAME}"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    continue_on: failed
  - name: rm
    description: cleanup
    command: |
      rm --force "$(cat ${SOURCE_FILE_FILE})"
      rm --force "${METADATA_FILE}"
      rm --force "${ADJUSTED_METADATA_FILE}"
      rm --force "${SHRUNK_FILE}"
