schedule: CRON_TZ=Etc/UTC 5,15,25,35,45,55 * * * *

steps:
  - name: get files
    type: ssh
    config:
      user: root
      host: tana.bob.house
      key: /run/secrets/id_rsa
      known_host_file: /run/secrets/known_hosts
    command: ls -1U /mnt/md1/downloads/pinchflat/shrink/*/*.mp4 2>/dev/null || true
    output: PATHS
  - name: count
    command: echo -n "${PATHS}" | grep --count ^ || true
    output: COUNT
  - name: one-item
    call: file-processor
    params: "PATH=${PATHS}"
    preconditions:
      - command: "${COUNT}"
        expected: "1"
    continue_on: skipped
  - name: multiple
    call: file-processor
    parallel:
      items: "${PATHS}"
      max_concurrent: 1
    params: "PATH=${ITEM}"
    preconditions:
      - command: "${COUNT}"
        expected: "0"
        negate: true
      - command: "${COUNT}"
        expected: "1"
        negate: true
    continue_on: skipped
---
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts

name: file-processor
params:
  - PATH: ""
steps:
  - name: get channel name
    command: echo -n "${PATH}" | sed --quiet --regexp-extended 's/^.+\/(.+?)\/(.+?)$/\1/p'
    output: CHANNEL
  - name: get filename
    command: echo -n "${PATH}" | sed --quiet --regexp-extended 's/^.+\/(.+?)\/(.+?)$/\2/p'
    output: FILE_NAME
  - name: make target directory
    command: mkdir "/mnt/md1/youtube/${CHANNEL}/"
    preconditions:
      - condition: test -d "/mnt/md1/youtube/${CHANNEL}/"
    continue_on: skipped
  - name: check existing
    command: echo "target directory exists"
    preconditions:
      - condition: test -f "/mnt/md1/youtube/${CHANNEL}/${FILE_NAME}"
        negate: true
  - name: metadata temporary file
    command: echo "/tmp/$(cat /proc/sys/kernel/random/uuid).txt"
    output: METADATA_FILE
  - name: extract metadata
    command: ffmpeg -hide_banner -y -i "${PATH}" -f ffmetadata "${METADATA_FILE}"
  - name: adjusted metadata temporary file
    command: echo "/tmp/$(cat /proc/sys/kernel/random/uuid).txt"
    output: ADJUSTED_METADATA_FILE
  - name: adjust chapters
    command: awk -F= '{ if($1~/^(END|START)$/) {$2=($2*10)/13; printf "%s=%d\n", $1, $2} else {print $0} }' "${METADATA_FILE}" > "${ADJUSTED_METADATA_FILE}"
  - name: shrunk temporary file
    command: echo "/tmp/$(cat /proc/sys/kernel/random/uuid).mp4"
    output: SHRUNK_FILE
  - name: shrink
    command: |
      ffmpeg -hide_banner -y -i "${PATH}" \
        -map 0:v:0 -filter:v:0 fps=fps=8,setpts=PTS/1.3 \
        -map 0:a:0 -filter:a:0 atempo=1.3 \
        -map 0:v:1 -codec:v:1 copy \
        -map_chapters -1 \
        "${SHRUNK_FILE}"
  - name: combine
    command: |
      ffmpeg -hide_banner -y \
        -i "${SHRUNK_FILE}" -i "${ADJUSTED_METADATA_FILE}" \
        -map 0 -map_metadata 1 -codec copy \
        "/mnt/md1/youtube/${CHANNEL}/${FILE_NAME}"
  - name: cleanup
    command:
      rm -f "${METADATA_FILE}"
      rm -f "${ADJUSTED_METADATA_FILE}"
      rm -f "${SHRUNK_FILE}"
      rm -f "${PATH}"
  - name: notify
    command: |
      curl --data "${FILE_NAME}" \
        --header 'Tags: tv,+1' \
        --header "Title: processed and sped-up ${FILE_NAME}" \
        --url 'https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e'
