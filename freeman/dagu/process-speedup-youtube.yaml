schedule: CRON_TZ=Etc/UTC 5,15,25,35,45,55 * * * *
steps:
  - id: get_files
    type: ssh
    with:
      user: root
      host: tana.bob.house
      key: /run/secrets/id_rsa
      known_host_file: /run/secrets/known_hosts
    script: |
      #! /bin/bash
      for source in /mnt/md1/downloads/pinchflat/shrink/*/*.mp4
      do
        if [ ! -f "${source}" ]; then continue; fi;

        channel=$(printf "%s" "${source}" | rev | cut --delimiter / --fields 2 | rev)
        filename=$(printf "%s" "${source}" | rev | cut --delimiter / --fields 1 | rev)
        target=$(printf "/mnt/md1/youtube/%s/%s" "${channel}" "${filename}")
        if [ ! -f "${target}" ]; then
          printf "{\"channel\":\"%s\",\"filename\":\"%s\",\"source\":\"%s\",\"target\":\"%s\"}" \
            "${channel}" "${filename}" "${source}" "${target}"
        fi
      done
    output: VIDEOS_LIST
  - id: format
    run: printf "%s" "${VIDEOS_LIST}" | jq --slurp
    depends: get_files
    output: VIDEOS
  - id: process_files
    action: dag.run
    with:
      dag: file-processor
      params: "VIDEO=${ITEM}"
    parallel:
      items: "${VIDEOS}"
      max_concurrent: 1
    preconditions:
      - condition: "${VIDEOS}"
        expected: "[]"
        negate: true
    depends: format
---
name: file-processor
params:
  - VIDEO: ""
ssh:
  user: root
  host: tana.bob.house
  key: /run/secrets/id_rsa
  known_host_file: /run/secrets/known_hosts
handler_on:
  success:
    call: success-processor
    params: "VIDEO=${VIDEO}"
steps:
  - id: mkdir
    run: mkdir --parents --verbose "$(dirname --zero "${VIDEO.target}")"
  - id: mktemp_metadata_file
    run: mktemp --quiet --suffix .txt
    output: METADATA_FILE
  - id: mktemp_adjusted_metadata_file
    run: mktemp --quiet --suffix .txt
    output: ADJUSTED_METADATA_FILE
  - id: mktemp_tempvideo_file
    run: mktemp --quiet --suffix .mp4
    output: TEMPVIDEO_FILE
  - id: get_chapters
    run: ffmpeg -hide_banner -loglevel error -y -i "${VIDEO.source}" -f ffmetadata "${METADATA_FILE}"
    depends: mktemp_metadata_file
  - id: adjust_chapters
    run: |
      awk -F= '{ if($1~/^(END|START)$/) {$2=($2*10)/13; printf "%s=%d\n", $1, $2} else {print $0} }' "${METADATA_FILE}" \
        > "${ADJUSTED_METADATA_FILE}"
    depends: [get_chapters, mktemp_adjusted_metadata_file]
  - id: shrink
    run: |
      ffmpeg -hide_banner -loglevel error -y -i "${VIDEO.source}" \
        -map 0:v:0 -filter:v:0 fps=fps=8,setpts=PTS/1.3 \
        -map 0:a:0 -filter:a:0 atempo=1.3 \
        -map 0:v:1 -codec:v:1 copy \
        -map_chapters -1 \
        "${TEMPVIDEO_FILE}"
    depends: [mktemp_tempvideo_file]
  - id: combine
    run: |
      ffmpeg -hide_banner -loglevel error -y \
        -i "${TEMPVIDEO_FILE}" -i "${ADJUSTED_METADATA_FILE}" \
        -map 0 -map_metadata 1 -codec copy \
        "${VIDEO.target}"
    depends: [mkdir, shrink, adjust_chapters]
---
name: success-processor
params:
  - VIDEO: ""
steps:
  - id: get_title
    run: printf "%s" "${VIDEO.filename}" | cut --delimiter _ --fields 3
    output: TITLE
  - id: notify
    type: http
    command: POST https://ntfy.bob.house/364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
    config:
      body: "${TITLE}"
      headers:
        Content-Type: text/plain
        Tags: tv
        Title: "new video from ${VIDEO.channel}"
      silent: true
      timeout: 5
    retry_policy:
      limit: 3
      interval_sec: 5
    depends: get_title
  - id: cleanup
    type: ssh
    command: rm --force "${VIDEO.source}"
    with:
      user: root
      host: tana.bob.house
      key: /run/secrets/id_rsa
      known_host_file: /run/secrets/known_hosts
