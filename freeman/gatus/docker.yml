endpoints:
  - name: billups
    group: docker
    url: http://192.168.1.75:2375/v1.52/_ping
    conditions: &conditions-definition
      - "[BODY] == OK"
      - "[RESPONSE_TIME] < 50"
      - "[STATUS] == 200"
    alerts: &alerts-definition
      - type: ntfy

  - name: freeman
    group: docker
    url: http://192.168.20.60:2375/v1.52/_ping
    conditions: *conditions-definition
    alerts: *alerts-definition

  - name: ransom
    group: docker
    url: http://192.168.20.65:2375/v1.52/_ping
    conditions: *conditions-definition
    alerts: *alerts-definition

  - name: shaxs
    group: docker
    url: http://192.168.20.55:2375/v1.52/_ping
    conditions: *conditions-definition
    alerts: *alerts-definition

  - name: tana
    group: docker
    url: http://192.168.20.70:2375/v1.52/_ping
    conditions: *conditions-definition
    alerts: *alerts-definition
