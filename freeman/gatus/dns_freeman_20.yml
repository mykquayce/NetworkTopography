endpoints:
  - name: adguard20 .20
    group: dns .20
    url: 192.168.20.60
    dns:
      query-name: adguard20.bob.house
      query-type: CNAME
    conditions: &conditions-definition
      - "[BODY] == freeman.bob.house."
      - "[DNS_RCODE] == NOERROR"
    alerts: &alerts-definition
