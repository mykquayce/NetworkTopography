endpoints:
  - name: adguard01 .1
    group: dns .1
    url: 192.168.1.50
    dns:
      query-name: adguard01.bob.house
      query-type: CNAME
    conditions: &conditions-definition
      - "[BODY] == freeman.bob.house."
      - "[DNS_RCODE] == NOERROR"
    alerts: &alerts-definition
