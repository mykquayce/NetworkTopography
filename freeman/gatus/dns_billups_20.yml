endpoints:
  - name: glances-billups .20
    group: dns .20
    enabled: false
    url: 192.168.20.60
    dns:
      query-name: glances-billups.bob.house
      query-type: CNAME
    conditions: &conditions-definition
      - "[BODY] == billups.bob.house."
      - "[DNS_RCODE] == NOERROR"
    alerts: &alerts-definition
      - type: ntfy

  - name: kopia-billups .20
    group: dns .20
    enabled: false
    url: 192.168.20.60
