suites:
  - name: badgey
    group: servers
    endpoints:
      - name: ping badgey
        url: icmp://192.168.1.50
        conditions: &ping-conditions-definition
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 100"
        alerts: &alerts-definition
          - type: ntfy
      - name: telegraf badgey
        url: http://192.168.1.50:9273/metrics
        conditions: &telegraf-conditions-definition
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 100"
          - "[STATUS] == 200"
          - "has([BODY]) == true"
        alerts: *alerts-definition
  - name: billups
    group: servers
    endpoints:
      - name: ping billups
        url: icmp://192.168.1.75
        conditions: *ping-conditions-definition
        alerts: *alerts-definition
      - name: telegraf billups
        url: http://192.168.1.75:9273/metrics
        conditions: *telegraf-conditions-definition
        alerts: *alerts-definition
      - name: docker billups
        url: http://192.168.1.75:2375/v1.52/_ping
        conditions: &docker-conditions-definition
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 100"
          - "[STATUS] == 200"
          - "len([BODY]) > 0"
          - "[BODY] == OK"
        alerts: *alerts-definition
      - name: traefik billups
        url: https://192.168.1.75/dashboard/
        headers:
          Host: traefik-billups.bob.house
        client: &traefik-client-definition
          insecure: true
          ignore-redirect: true
        conditions: &traefik-conditions-definition
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 100"
          - "[STATUS] == 200"
          - "len([BODY]) > 0"
        alerts: *alerts-definition
