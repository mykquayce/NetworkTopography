endpoints:
  - name: miasma .1
    group: dns .1
    url: 192.168.1.50
    dns:
      query-name: miasma.bob.house
      query-type: CNAME
    conditions: &conditions-definition
      - "[BODY] == kayshon.bob.house."
      - "[DNS_RCODE] == NOERROR"
    alerts: &alerts-definition
      - type: ntfy

  - name: www .1
    group: dns .1
    url: 192.168.1.50
    dns:
      query-name: www.bob.house
      query-type: CNAME
    conditions: *conditions-definition
    alerts: *alerts-definition
