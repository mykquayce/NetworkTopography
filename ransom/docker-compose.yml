services:
  apprise:
    image: caronc/apprise:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      APPRISE_ADMIN: "y"
      APPRISE_STATEFUL_MODE: simple
      APPRISE_WORKER_COUNT: "1"
      TZ: Etc/UTC
    healthcheck:
      test: curl --fail http://localhost:8000/status || exit 1
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.apprise-router.entrypoints: websecure
      traefik.http.routers.apprise-router.rule: Host(`apprise.bob.house`)
      traefik.http.routers.apprise-router.tls: "true"
      traefik.http.services.apprise-service.loadbalancer.server.port: "8000"
    networks:
      default: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.apprise/attach/:/attach/:rw
      - ~/.apprise/config/:/config/:rw
      - ~/.apprise/plugin/:/plugin/:rw

  changedetection:
    image: dgtlmoon/changedetection.io:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.changedetection-router.entrypoints: websecure
      traefik.http.routers.changedetection-router.rule: Host(`changedetection.bob.house`)
      traefik.http.routers.changedetection-router.tls: "true"
      traefik.http.services.changedetection-service.loadbalancer.server.port: "5000"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.changedetection/:/datastore/:rw

  donetick:
    image: donetick/donetick:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      DT_ENV: selfhosted
      DT_SQLITE_PATH: /donetick-data/donetick.db
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.donetick-router.entrypoints: websecure
      traefik.http.routers.donetick-router.rule: Host(`donetick.bob.house`)
      traefik.http.routers.donetick-router.tls: "true"
      traefik.http.services.donetick-service.loadbalancer.server.port: "2021"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.donetick/:/donetick-data/:rw
      - ./donetick/selfhosted.yaml:/config/selfhosted.yaml:ro

  degoog:
    image: ghcr.io/fccview/degoog:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      gluetun:
        condition: service_healthy
    labels:
      dd.watch.digest: "true"
      traefik.enable: "false"
    network_mode: service:gluetun
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.degoog/:/app/data/:rw

  drawio:
    image: jgraph/drawio:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.drawio-router.entrypoints: websecure
      traefik.http.routers.drawio-router.rule: Host(`drawio.bob.house`)
      traefik.http.routers.drawio-router.tls: "true"
      traefik.http.services.drawio-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]

  drydock:
    image: codeswhat/drydock:latest
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    depends_on:
      socket-proxy:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/drydock.env
    environment:
      DD_AUTH_BASIC_ADMIN_USER: admin
      DD_NOTIFICATION_NTFY_NTFY_TOPIC: 364d0bdedc5b0bc275b048dc42e342460fb535dc1efcc5daf35460bf4ba4c26e
      DD_NOTIFICATION_NTFY_NTFY_URL: https://ntfy.bob.house/
      DD_SERVER_FEATURE_DELETE: "false"
      DD_WATCHER_FREEMAN_HOST: freeman.bob.house
      DD_WATCHER_FREEMAN_CRON: 0 */6 * * *
      DD_WATCHER_RANSOM_HOST: socket-proxy
      DD_WATCHER_RANSOM_CRON: 15 */6 * * *
      DD_WATCHER_SHAXS_HOST: shaxs.bob.house
      DD_WATCHER_SHAXS_CRON: 30 */6 * * *
      DD_WATCHER_TANA_HOST: tana.bob.house
      DD_WATCHER_TANA_CRON: 45 */6 * * *
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.drydock-router.entrypoints: websecure
      traefik.http.routers.drydock-router.rule: Host(`drydock.bob.house`)
      traefik.http.routers.drydock-router.tls: "true"
      traefik.http.services.drydock-service.loadbalancer.server.port: "3000"
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    networks:
      default: null
      socket-proxy: null
      traefik: null

  freshrss:
    image: freshrss/freshrss:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      CRON_MIN: 3,33
      TZ: UTC
    env_file:
      - ~/Configurations/freshrss.env
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.freshrss-router.entrypoints: websecure
      traefik.http.routers.freshrss-router.rule: Host(`freshrss.bob.house`)
      traefik.http.routers.freshrss-router.tls: "true"
      traefik.http.services.freshrss-service.loadbalancer.server.port: "80"
    logging:
      options:
        max-size: 10m
    security_opt: [ no-new-privileges=true, ]
    networks:
      default: null
      traefik: null
    volumes:
      - ~/.freshrss/data/:/var/www/FreshRSS/data/:rw
      - ~/.freshrss/extensions/:/var/www/FreshRSS/extensions/:rw

  glances:
    image: nicolargo/glances:latest
    cap_drop: [ ALL, ]
    cap_add: [ SYS_ADMIN, SYS_RAWIO, ]
    depends_on:
      socket-proxy:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GLANCES_OPT: -w
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.glances-router.entrypoints: websecure
      traefik.http.routers.glances-router.rule: Host(`glances-ransom.bob.house`)
      traefik.http.routers.glances-router.tls: "true"
      traefik.http.services.glances-service.loadbalancer.server.port: "61208"
    networks:
      socket-proxy: null
      traefik: null
    pid: host
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - /etc/os-release:/etc/os-release:ro

  gluetun:
    image: qmcgaw/gluetun:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHECKPOINT_RESTORE, CHOWN, DAC_OVERRIDE, FOWNER, NET_ADMIN, NET_RAW, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: Etc/UTC
      UPDATER_PERIOD: 24h
    env_file:
      - ~/Configurations/gluetun.env
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.gluetun-router.entrypoints: websecure
      traefik.http.routers.gluetun-router.rule: Host(`gluetun-ransom.bob.house`)
      traefik.http.routers.gluetun-router.tls: "true"
      traefik.http.routers.gluetun-router.service: gluetun-service
      traefik.http.services.gluetun-service.loadbalancer.server.port: "8000"
      traefik.http.routers.degoog-router.entrypoints: websecure
      traefik.http.routers.degoog-router.rule: Host(`degoog.bob.house`)
      traefik.http.routers.degoog-router.tls: "true"
      traefik.http.routers.degoog-router.service: degoog-service
      traefik.http.services.degoog-service.loadbalancer.server.port: "4444"
    networks:
      default: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  grafana:
    image: grafana/grafana-oss:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      GF_ENABLE_GZIP: "true"
      GF_SERVER_ROOT_URL: https://grafana.bob.house
      GF_USERS_ALLOW_SIGN_UP: "false"
    env_file:
      - ~/Configurations/grafana.env
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.grafana-router.entrypoints: websecure
      traefik.http.routers.grafana-router.rule: Host(`grafana.bob.house`)
      traefik.http.routers.grafana-router.tls: "true"
      traefik.http.services.grafana-service.loadbalancer.server.port: "3000"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: "0"
    volumes:
      - ~/.grafana/:/var/lib/grafana/:rw

  httpbin:
    image: mccutchen/go-httpbin:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.httpbin-router.entrypoints: websecure
      traefik.http.routers.httpbin-router.rule: Host(`httpbin.bob.house`)
      traefik.http.routers.httpbin-router.tls: "true"
      traefik.http.services.httpbin-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]

  it-tools:
    image: ghcr.io/corentinth/it-tools:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.it-tools-router.entrypoints: websecure
      traefik.http.routers.it-tools-router.rule: Host(`it-tools.bob.house`)
      traefik.http.routers.it-tools-router.tls: "true"
      traefik.http.services.it-tools-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  jsonpath:
    image: ashphy/jsonpath-online-evaluator:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.jsonpath-router.entrypoints: websecure
      traefik.http.routers.jsonpath-router.rule: Host(`jsonpath.bob.house`)
      traefik.http.routers.jsonpath-router.tls: "true"
      traefik.http.services.jsonpath-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  karakeep:
    image: ghcr.io/karakeep-app/karakeep:release
    cap_drop: [ ALL, ]
    environment:
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      DATA_DIR: /data
      MEILI_ADDR: http://karakeep-meilisearch:7700
    depends_on:
      traefik:
        condition: service_healthy
      karakeep-chrome:
        condition: service_started
      karakeep-meilisearch:
        condition: service_started
    env_file:
      - ~/Configurations/karakeep.env
    labels:
      dd.watch.digest: "true"
      dev.dozzle.group: karakeep
      traefik.docker.network: ransom_traefik
      traefik.http.routers.karakeep-router.entrypoints: websecure
      traefik.http.routers.karakeep-router.rule: Host(`karakeep.bob.house`)
      traefik.http.routers.karakeep-router.tls: "true"
      traefik.http.services.karakeep-service.loadbalancer.server.port: "3000"
    networks:
      default: null
      karakeep: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.karakeep/data/:/data/:rw

  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    cap_drop: [ ALL, ]
    command:
      - --disable-dev-shm-usage
      - --disable-gpu
      - --hide-scrollbars
      - --no-sandbox
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
    labels:
      dd.tag.include: ^124$$
      dd.watch.digest: "true"
      dev.dozzle.group: karakeep
      traefik.enable: "false"
    networks:
      default: null
      karakeep: null
    security_opt: [ no-new-privileges=true, ]

  karakeep-meilisearch:
    image: getmeili/meilisearch:v1.41.0
    cap_drop: [ ALL, ]
    environment:
      MEILI_NO_ANALYTICS: "true"
    env_file:
      - ~/Configurations/karakeep.env
    labels:
      dd.tag.include: ^v1\.41\.\d+$$
      dd.watch.digest: "true"
      dev.dozzle.group: karakeep
      traefik.enable: "false"
    networks:
      karakeep: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.karakeep/meilisearch/:/meili_data/:rw

  kopia:
    image: kopia/kopia:latest
    cap_drop: [ ALL, ]
    cap_add: [ CAP_DAC_OVERRIDE, ]
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=a72691ffb1328c15
      - --server-password=54b2ffddfbb10d02b59a5c2b8f9149ff
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/kopia.env
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.kopia-router.entrypoints: websecure
      traefik.http.routers.kopia-router.rule: Host(`kopia-ransom.bob.house`)
      traefik.http.routers.kopia-router.tls: "true"
      traefik.http.services.kopia-service.loadbalancer.server.port: "51515"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      # Mount local folders needed by kopia
      - ~/.kopia/config/:/app/config/:rw
      - ~/.kopia/cache/:/app/cache/:rw
      - ~/.kopia/logs/:/app/logs/:rw
      # Mount local folders to snapshot
      - ~/:/data/:ro
      # Mount repository location
      - /repository/:/repository/:rw

  moodist:
    image: ghcr.io/remvze/moodist:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, NET_BIND_SERVICE, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.moodist-router.entrypoints: websecure
      traefik.http.routers.moodist-router.rule: Host(`moodist.bob.house`)
      traefik.http.routers.moodist-router.tls: "true"
      traefik.http.services.moodist-service.loadbalancer.server.port: "8080"
    logging:
      options:
        max-size: 1g
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  n8n:
    image: n8nio/n8n:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
       GENERIC_TIMEZONE: UTC
       N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
       N8N_PROXY_HOPS: "1"
       TZ: UTC
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.n8n-router.entrypoints: websecure
      traefik.http.routers.n8n-router.rule: Host(`n8n.bob.house`)
      traefik.http.routers.n8n-router.tls: "true"
      traefik.http.services.n8n-service.loadbalancer.server.port: "5678"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    user: "0"
    volumes:
      - ~/.n8n/:/home/node/.n8n/:rw

  nsd01:
    build:
      dockerfile_inline: |
        FROM alpine:latest
        RUN apk add --no-cache --update nsd
        CMD ["sh", "-c", "nsd; sleep infinity"]
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    healthcheck:
      test: ["CMD-SHELL", "nslookup -type=CNAME homepage.bob.house 127.0.0.1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      dd.watch: "false"
    ports:
      - 192.168.1.65:53:53/tcp
      - 192.168.1.65:53:53/udp
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ./nsd/nsd.conf:/etc/nsd/nsd.conf:ro
      - ./nsd/db.bob.house.1:/zones/db.bob.house:ro

  nsd20:
    build:
      dockerfile_inline: |
        FROM alpine:latest
        RUN apk add --no-cache --update nsd
        CMD ["sh", "-c", "nsd; sleep infinity"]
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    healthcheck:
      test: ["CMD-SHELL", "nslookup -type=CNAME homepage.bob.house 127.0.0.1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      dd.watch: "false"
    ports:
      - 192.168.20.65:53:53/tcp
      - 192.168.20.65:53:53/udp
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ./nsd/nsd.conf:/etc/nsd/nsd.conf:ro
      - ./nsd/db.bob.house.20:/zones/db.bob.house:ro

  ntfy:
    image: binwiederhier/ntfy:latest
    cap_drop: [ ALL, ]
    command:
      - serve
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      TZ: UTC
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.ntfy-router.entrypoints: websecure
      traefik.http.routers.ntfy-router.rule: Host(`ntfy.bob.house`)
      traefik.http.routers.ntfy-router.tls: "true"
      traefik.http.services.ntfy-service.loadbalancer.server.port: "80"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.ntfy/:/var/cache/ntfy/:rw
      - ./ntfy.yml:/etc/ntfy/server.yml:ro

  nuget:
    image: bagetter/bagetter:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/nuget.env
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.nuget-router.entrypoints: websecure
      traefik.http.routers.nuget-router.rule: Host(`nuget.bob.house`)
      traefik.http.routers.nuget-router.tls: "true"
      traefik.http.services.nuget-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.bagetter/:/data:rw

  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      paperless-ngx-db:
        condition: service_healthy
        required: true
      paperless-ngx-redis:
        condition: service_healthy
        required: true
      traefik:
        condition: service_healthy
        required: true
    env_file:
      - ~/Configurations/paperless-ngx.env
    environment:
      PAPERLESS_BIND_ADDR: 0.0.0.0
      PAPERLESS_DBHOST: paperless-ngx-db
      PAPERLESS_REDIS: redis://paperless-ngx-redis:6379
      PAPERLESS_URL: https://paperless-ngx.bob.house
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000']
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 10
    labels:
      dd.watch.digest: "true"
      dev.dozzle.group: paperless-ngx
      traefik.docker.network: ransom_traefik
      traefik.http.routers.paperless-ngx-router.entrypoints: websecure
      traefik.http.routers.paperless-ngx-router.rule: Host(`paperless-ngx.bob.house`)
      traefik.http.routers.paperless-ngx-router.tls: "true"
      traefik.http.services.paperless-ngx-service.loadbalancer.server.port: "8000"
    networks:
      paperless-ngx: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.paperless-ngx/consume/:/usr/src/paperless/consume/:rw
      - ~/.paperless-ngx/data/:/usr/src/paperless/data/:rw
      - ~/.paperless-ngx/media/:/usr/src/paperless/media/:rw
      - ~/.paperless-ngx/export/:/usr/src/paperless/export/:rw
      - ~/.paperless-ngx/media/:/usr/src/paperless/media/:rw

  paperless-ngx-db:
    image: docker.io/library/postgres:18
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 10
    labels:
      dd.tag.include: ^18$$
      dd.watch.digest: "true"
      dev.dozzle.group: paperless-ngx
      traefik.enable: "false"
    networks:
      paperless-ngx: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.paperless-ngx/db/:/var/lib/postgresql/:rw

  paperless-ngx-redis:
    image: docker.io/library/redis:8
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETPCAP, SETUID, ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 10
    labels:
      dd.tag.include: ^8$$
      dd.watch.digest: "true"
      dev.dozzle.group: paperless-ngx
      traefik.enable: "false"
    networks:
      paperless-ngx: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.paperless-ngx/redis/:/data/:rw

  planka:
    image: ghcr.io/plankanban/planka:latest
    cap_drop: [ ALL, ]
    depends_on:
      planka-db:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      BASE_URL: https://planka.bob.house
      DATABASE_URL: postgresql://postgres@planka-db/planka
      DEFAULT_ADMIN_EMAIL: demo@demo.demo # Do not remove if you want to prevent this user from being edited/deleted
      DEFAULT_ADMIN_NAME: Demo Demo
      DEFAULT_ADMIN_PASSWORD: demo
      DEFAULT_ADMIN_USERNAME: demo
      OIDC_ISSUER: https://authentik.bob.house/application/o/planka/
      OIDC_SCOPES: openid profile email
      OIDC_ADMIN_ROLES: authentik Admins
      OIDC_ENFORCED: "true"
    env_file:
      - ~/Configurations/planka.env
    labels:
      dd.watch.digest: "true"
      dev.dozzle.group: planka
      traefik.docker.network: ransom_traefik
      traefik.http.routers.planka-router.entrypoints: websecure
      traefik.http.routers.planka-router.rule: Host(`planka.bob.house`)
      traefik.http.routers.planka-router.tls: "true"
      traefik.http.services.planka-service.loadbalancer.server.port: "1337"
    networks:
      default: null
      planka: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.planka/data:/app/data/:rw

  planka-db:
    image: postgres:16-alpine
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d planka
      timeout: 5s
      interval: 10s
      retries: 5
    labels:
      dd.tag.include: ^16-alpine$$
      dd.watch.digest: "true"
      dev.dozzle.group: planka
      traefik.enable: "false"
    networks:
      planka: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.planka/db/:/var/lib/postgresql/data/:rw

  registry:
    image: registry:latest
    cap_drop: [ ALL, ]
    environment:
      OTEL_TRACES_EXPORTER: none
      REGISTRY_LOG_LEVEL: info
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    env_file:
      - ~/Configurations/registry.env
    labels:
      dd.watch.digest: "true"
      dev.dozzle.group: registry
      traefik.docker.network: ransom_traefik
      traefik.http.routers.registry-router.entrypoints: websecure
      traefik.http.routers.registry-router.rule: Host(`registry.bob.house`)
      traefik.http.routers.registry-router.tls: "true"
      traefik.http.services.registry-service.loadbalancer.server.port: "5000"
    networks:
      default: null
      registry: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.registry/:/var/lib/registry/:rw

  registry-ui:
    image: joxit/docker-registry-ui:main
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, SETGID, SETUID, ]
    depends_on:
      registry:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      CATALOG_ELEMENTS_LIMIT: "1000"
      CATALOG_MAX_BRANCHES: "1"
      CATALOG_MIN_BRANCHES: "1"
      DELETE_IMAGES: "true"
      NGINX_PROXY_PASS_URL: http://registry:5000
      REGISTRY_SECURED: "false"
      REGISTRY_TITLE: Docker Registry UI
      SHOW_CATALOG_NB_TAGS: "true"
      SHOW_CONTENT_DIGEST: "true"
      SINGLE_REGISTRY: "true"
      TAGLIST_PAGE_SIZE: "100"
    labels:
      dd.watch.digest: "true"
      dev.dozzle.group: registry
      traefik.docker.network: ransom_traefik
      traefik.http.routers.registry-ui-router.entrypoints: websecure
      traefik.http.routers.registry-ui-router.rule: Host(`registry-ui.bob.house`)
      traefik.http.routers.registry-ui-router.tls: "true"
      traefik.http.services.registry-ui-service.loadbalancer.server.port: "80"
    networks:
      registry: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest 
    cap_drop: [ ALL, ]
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      IMAGES: "1"
      INFO: "1"
      NETWORKS: "1"
      SERVICES: "1"
      VERSION: "1"
    healthcheck:
      test: wget --spider http://localhost:2375/version || exit 1
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      dd.watch.digest: "true"
      traefik.enable: "false"
    networks:
      default: null
      socket-proxy: null
    ports: [ 2375:2375/tcp, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /run, ]
    volumes: [ /var/run/docker.sock:/var/run/docker.sock:rw, ]

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      APP_TIMEZONE: UTC
      APP_URL: https://speedtest.bob.house
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: 0 */3 * * * #every 3rd hour
      SPEEDTEST_SERVERS: 2262, 3504, 20746, 48475, 57115, 59135, 62951, 67541
      PRUNE_RESULTS_OLDER_THAN: 28 #28 days
    env_file:
      - ~/Configurations/speedtest-tracker.env
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.speedtest-router.entrypoints: websecure
      traefik.http.routers.speedtest-router.rule: Host(`speedtest.bob.house`)
      traefik.http.routers.speedtest-router.tls: "true"
      traefik.http.services.speedtest-service.loadbalancer.server.port: "80"
    networks:
      default: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.speedtest/:/config/:rw

  traefik:
    image: traefik:latest
    cap_drop: [ ALL, ]
    command:
      # - --accesslog=true
      - --api.insecure=true
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.cloudflare.acme.email=mail@bob.codes
      - --certificatesresolvers.cloudflare.acme.storage=/var/certs/acme.json
      - --entrypoints.websecure.address=:443
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
      # TRACE  DEBUG  INFO  WARN  ERROR  FATAL  PANIC
      - --log.level=INFO
      - --metrics.prometheus=true
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --ping
      - --providers.docker
      - --providers.docker.endpoint=tcp://socket-proxy:2375
    depends_on:
      socket-proxy:
        condition: service_healthy
    env_file:
      - ~/Configurations/traefik.env
    healthcheck:
      test: /usr/local/bin/traefik healthcheck --ping
    labels:
      dd.watch.digest: "true"
      traefik.docker.network: ransom_traefik
      traefik.http.routers.traefik-router.entrypoints: websecure
      traefik.http.routers.traefik-router.rule: Host(`traefik-ransom.bob.house`)
      traefik.http.routers.traefik-router.tls: "true"
      traefik.http.routers.traefik-router.tls.certresolver: cloudflare
      traefik.http.routers.traefik-router.tls.domains[0].main: bob.house
      traefik.http.routers.traefik-router.tls.domains[0].sans: '*.bob.house'
      traefik.http.services.traefik-service.loadbalancer.server.port: "8080"
    networks:
      default: null
      socket-proxy: null
      traefik: null
    ports:
      - 443:443/tcp
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - certificates-volume:/var/certs/:rw
      - /etc/localtime:/etc/localtime:ro

  trilium:
    image: triliumnext/trilium:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      TRILIUM_DATA_DIR: /home/node/trilium-data
    labels:
      dd.watch.digest: "true"
      traefik.http.routers.trilium-router.entrypoints: websecure
      traefik.http.routers.trilium-router.rule: Host(`trilium.bob.house`)
      traefik.http.routers.trilium-router.tls: "true"
      traefik.http.services.trilium-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    user: "0:0"
    volumes:
      - ~/.trilium/:/home/node/trilium-data/:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  vikunja:
    image: vikunja/vikunja:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
      vikunja-db:
        condition: service_healthy
    env_file:
      - ~/Configurations/vikunja.env
    environment:
      VIKUNJA_SERVICE_PUBLICURL: https://vikunja.bob.house/
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_DATABASE: vikunja
    labels:
      dd.watch.digest: "true"
      dev.dozzle.group: vikunja
      traefik.docker.network: ransom_traefik
      traefik.http.routers.vikunja-router.entrypoints: websecure
      traefik.http.routers.vikunja-router.rule: Host(`vikunja.bob.house`)
      traefik.http.routers.vikunja-router.tls: "true"
      traefik.http.services.vikunja-service.loadbalancer.server.port: "3456"
    networks:
      traefik: null
      vikunja: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: "0"
    volumes:
      - ~/.vikunja/files/:/app/vikunja/files/:rw

  vikunja-db:
    image: postgres:18
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    env_file:
      - ~/Configurations/vikunja.env
    environment:
      POSTGRES_USER: vikunja
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 2s
      start_period: 30s
    labels:
      dd.tag.include: ^18$$
      dd.watch.digest: "true"
      dev.dozzle.group: vikunja
      traefik.enable: "false"
    networks:
      vikunja: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.vikunja/db/:/var/lib/postgresql/:rw

networks:
  default:
    name: ransom_default
  karakeep:
    name: ransom_karakeep
    internal: "true"
  paperless-ngx:
    name: ransom_paperless-ngx
    internal: "true"
  planka:
    name: ransom_planka
    internal: "true"
  registry:
    name: ransom_registry
    internal: "true"
  socket-proxy:
    name: ransom_socket-proxy
    internal: "true"
  traefik:
    name: ransom_traefik
    internal: "true"
  vikunja:
    name: ransom_vikunja
    internal: "true"

volumes:
  certificates-volume:
