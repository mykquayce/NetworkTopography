services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.2
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, FOWNER, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/apex_0:/dev/apex_0
    env_file:
      - /opt/git/Configurations/frigate.env
    labels:
      dd.tag.family: loose
      dd.tag.include: ^v\d+\.\d+\.\d+$$
      dd.watch: "true"
      traefik.docker.network: shaxs_traefik
      traefik.http.routers.frigate-router.entrypoints: websecure
      traefik.http.routers.frigate-router.rule: Host(`frigate.bob.house`)
      traefik.http.routers.frigate-router.tls: "true"
      traefik.http.services.frigate-service.loadbalancer.server.port: "5000"
    networks:
      default: null
      traefik: null
    profiles: [ app, ]
    security_opt: [ no-new-privileges=true, ]
    shm_size: 192mb
    volumes:
      - ./frigate.yaml:/config/config.yaml:rw
      - /opt/appdata/frigate/:/config/:rw
      - /recordings/:/media/frigate/:rw
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /tmp/cache
        tmpfs:
          size: 1gb

  glances:
    image: nicolargo/glances:latest
    cap_drop: [ ALL, ]
    cap_add: [ SYS_ADMIN, SYS_RAWIO, ]
    depends_on:
      socket-proxy:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GLANCES_OPT: -w
    labels:
      traefik.docker.network: shaxs_traefik
      traefik.http.routers.glances-router.entrypoints: websecure
      traefik.http.routers.glances-router.rule: HostRegexp(`^glances-\w+\.bob\.house$`)
      traefik.http.routers.glances-router.tls: "true"
      traefik.http.services.glances-service.loadbalancer.server.port: "61208"
    networks:
      socket-proxy: null
      traefik: null
    pid: host
    profiles: [ app, monitoring, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - /etc/os-release:/etc/os-release:ro

  kopia:
    image: kopia/kopia:latest
    cap_drop: [ ALL, ]
    cap_add: [ DAC_OVERRIDE, ]
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=a72691ffb1328c15
      - --server-password=54b2ffddfbb10d02b59a5c2b8f9149ff
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - /opt/git/Configurations/kopia.env
    labels:
      traefik.http.routers.kopia-router.entrypoints: websecure
      traefik.http.routers.kopia-router.rule: HostRegexp(`^kopia-\w+\.bob\.house$`)
      traefik.http.routers.kopia-router.tls: "true"
      traefik.http.services.kopia-service.loadbalancer.server.port: "51515"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /app/cache/, /app/logs/, ]
    volumes:
      # Mount local folders needed by kopia
      - /opt/appdata/kopia/:/app/config/:rw
      # Mount local folders to snapshot
      - /opt/appdata/.:/data/:ro
      # Mount repository location
      - /repository/:/repository/:rw

  socket-proxy:
    image: tecnativa/docker-socket-proxy:${DOCKER_SOCKET_PROXY_IMAGE_TAG?:missing docker-socket-proxy image tag}
    cap_drop: [ ALL, ]
    environment:
      DISABLE_IPV6: "true"
      LOG_LEVEL: info
      TZ: Etc/UTC

      CONTAINERS: "1"
      EVENTS: "1"
      IMAGES: "1"
      INFO: "1"
      PING: "1"
      SERVICES: "1"
      VERSION: "1"
    healthcheck:
      test: wget --spider http://127.0.0.1:2375/version || exit 1
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      dd.tag.family: loose
      dd.watch: "true"
      traefik.docker.network: shaxs_traefik
      traefik.tcp.routers.socket-proxy-router.entrypoints: docker
      traefik.tcp.routers.socket-proxy-router.rule: HostSNI(`*`)
      traefik.tcp.services.socket-proxy-service.loadbalancer.server.port: "2375"
    networks:
      socket-proxy: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /run, /tmp, ]
    volumes: [ /var/run/docker.sock:/var/run/docker.sock, ]

  traefik:
    image: traefik:${TRAEFIK_IMAGE_TAG?:missing traefik image tag}
    cap_drop: [ ALL, ]
    command:
      # - --accesslog=true
      - --api.insecure=true
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.cloudflare.acme.email=mail@bob.codes
      - --certificatesresolvers.cloudflare.acme.storage=/var/certs/acme.json
      - --entrypoints.docker.address=:2375
      - --entrypoints.websecure.address=:443
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
      # TRACE  DEBUG  INFO  WARN  ERROR  FATAL  PANIC
      - --log.level=INFO
      - --metrics.prometheus=true
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --ping
      - --providers.docker
      - --providers.docker.endpoint=tcp://socket-proxy:2375
    depends_on:
      socket-proxy:
        condition: service_healthy
    env_file:
      - /opt/git/Configurations/traefik.env
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 10s
      timeout: 10s
      retries: 5
    labels:
      dd.tag.family: loose
      dd.watch: "true"
      traefik.docker.network: shaxs_traefik
      traefik.http.routers.traefik-router.entrypoints: websecure
      traefik.http.routers.traefik-router.rule: HostRegexp(`^traefik-\w+\.bob\.house$`)
      traefik.http.routers.traefik-router.tls: "true"
      traefik.http.routers.traefik-router.tls.certresolver: cloudflare
      traefik.http.routers.traefik-router.tls.domains[0].main: bob.house
      traefik.http.routers.traefik-router.tls.domains[0].sans: '*.bob.house'
      traefik.http.services.traefik-service.loadbalancer.server.port: "8080"
    networks:
      default: null
      socket-proxy: null
      traefik: null
    ports:
      - 192.168.1.55:443:443/tcp
      - 192.168.20.55:443:443/tcp
      - 192.168.1.55:2375:2375/tcp
      - 192.168.20.55:2375:2375/tcp
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - certificates-volume:/var/certs/:rw
      - /etc/localtime:/etc/localtime:ro

networks:
  default:
    name: shaxs_default
  socket-proxy:
    name: shaxs_socket-proxy
    internal: "true"
  traefik:
    name: shaxs_traefik
    internal: "true"

volumes:
  certificates-volume:
