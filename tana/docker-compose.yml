services:
  feishin:
    image: ghcr.io/jeffvli/feishin:latest
    cap_drop: [ ALL, ]
    depends_on:
      navidrome:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      ANALYTICS_DISABLED: "true"
      LEGACY_AUTHENTICATION: "false"
      SERVER_LOCK: "true"
      SERVER_NAME: navidrome
      SERVER_TYPE: navidrome
      SERVER_URL: https://navidrome.bob.house
    labels:
      traefik.http.routers.feishin-router.entrypoints: websecure
      traefik.http.routers.feishin-router.rule: Host(`feishin.bob.house`)
      traefik.http.routers.feishin-router.tls: "true"
      traefik.http.services.feishin-service.loadbalancer.server.port: "9180"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]

  ganymede:
    image: ghcr.io/zibbp/ganymede:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, SETGID, SETUID, ]
    depends_on:
      ganymede-db:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/ganymede.env
    environment:
      DEBUG: "false"
      TZ: Etc/UTC
      VIDEOS_DIR: /data/videos
      TEMP_DIR: /data/temp
      LOGS_DIR: /data/logs
      CONFIG_DIR: /data/config
      DB_HOST: ganymede-db
      DB_PORT: "5432"
      DB_SSL: disable
      MAX_CHAT_DOWNLOAD_EXECUTIONS: "3"
      MAX_CHAT_RENDER_EXECUTIONS: "2"
      MAX_VIDEO_DOWNLOAD_EXECUTIONS: "2"
      MAX_VIDEO_CONVERT_EXECUTIONS: "3"
      MAX_VIDEO_SPRITE_THUMBNAIL_EXECUTIONS: "2"
      SHOW_SSO_LOGIN_BUTTON: "true"
      FORCE_SSO_AUTH: "false"
      REQUIRE_LOGIN: "false"
    healthcheck:
      test: curl --fail http://localhost:4000/health || exit 1
      interval: 60s
      retries: 5
      start_period: 60s
      timeout: 10s
    labels:
      dev.dozzle.group: ganymede
      traefik.docker.network: tana_traefik
      traefik.http.routers.ganymede-router.entrypoints: websecure
      traefik.http.routers.ganymede-router.rule: Host(`ganymede.bob.house`)
      traefik.http.routers.ganymede-router.tls: "true"
      traefik.http.services.ganymede-service.loadbalancer.server.port: "4000"
    networks:
      default: null
      ganymede: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.ganymede/config/:/data/config/:rw
      - /mnt/md1/ganymede/logs/:/data/logs/:rw
      - /mnt/md1/ganymede/temp/:/data/temp/:rw
      - /mnt/md1/ganymede/videos/:/data/videos/:rw

  ganymede-db:
    image: postgres:14
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    env_file:
      - ~/Configurations/ganymede.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 60s
    labels:
      dd.tag.include: ^14$$
      dev.dozzle.group: ganymede
      traefik.enable: "false"
    networks:
      ganymede: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /var/run/, ]
    volumes:
      - ~/.ganymede/db/:/var/lib/postgresql/data/:rw

  glances:
    image: nicolargo/glances:latest
    cap_drop: [ ALL, ]
    cap_add: [ SYS_ADMIN, SYS_RAWIO, ]
    depends_on:
      socket-proxy:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GLANCES_OPT: -w
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.glances-router.entrypoints: websecure
      traefik.http.routers.glances-router.rule: Host(`glances-tana.bob.house`)
      traefik.http.routers.glances-router.tls: "true"
      traefik.http.services.glances-service.loadbalancer.server.port: "61208"
    networks:
      socket-proxy: null
      traefik: null
    pid: host
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - /etc/os-release:/etc/os-release:ro

  gluetun:
    image: qmcgaw/gluetun:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHECKPOINT_RESTORE, CHOWN, DAC_OVERRIDE, FOWNER, NET_ADMIN, NET_RAW, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: Etc/UTC
      SERVER_COUNTRIES: Bulgaria,Croatia,Montenegro,Serbia,Slovenia
      UPDATER_PERIOD: 24h
    env_file:
      - ~/Configurations/gluetun.env
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.gluetun-router.entrypoints: websecure
      traefik.http.routers.gluetun-router.rule: Host(`gluetun-tana.bob.house`)
      traefik.http.routers.gluetun-router.tls: "true"
      traefik.http.routers.gluetun-router.service: gluetun-service
      traefik.http.services.gluetun-service.loadbalancer.server.port: "8000"
      traefik.http.routers.qbittorrent-router.entrypoints: websecure
      traefik.http.routers.qbittorrent-router.rule: Host(`qbittorrent.bob.house`)
      traefik.http.routers.qbittorrent-router.tls: "true"
      traefik.http.routers.qbittorrent-router.service: qbittorrent-service
      traefik.http.services.qbittorrent-service.loadbalancer.server.port: "8080"
    networks:
      default: null
      traefik: null
    ports:
      - 192.168.1.70:6881:6881/tcp # qbittorrent
      - 192.168.1.70:6881:6881/udp
      - 192.168.20.70:6881:6881/tcp # qbittorrent
      - 192.168.20.70:6881:6881/udp
    security_opt: [ no-new-privileges=true, ]

  jellyfin:
    image: jellyfin/jellyfin:latest
    cap_drop: [ ALL, ]
    cap_add: [ DAC_OVERRIDE, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/dri:/dev/dri
    healthcheck:
      test: curl -f http://localhost:8096/health
    labels:
      traefik.http.routers.jellyfin-router.entrypoints: websecure
      traefik.http.routers.jellyfin-router.rule: Host(`jellyfin.bob.house`)
      traefik.http.routers.jellyfin-router.tls: "true"
      traefik.http.services.jellyfin-service.loadbalancer.server.port: "8096"
    networks:
      default: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/log/, ]
    volumes:
      - ~/.jellyfin/:/config/:rw
      - /mnt/md1/anime/:/media/anime/:rw
      - /mnt/md1/films/:/media/films/:rw
      - /mnt/md1/streamers/:/media/streamers/:rw
      - /mnt/md0/tvshows/:/media/tv/:rw
      - /mnt/md1/videos/:/media/videos/:rw
      - /mnt/md1/music/:/media/music/:rw
      - /mnt/md1/pictures/:/media/pictures/:rw
      - /mnt/md1/youtube/:/media/youtube/:rw
      - /mnt/md1/youtarr/:/media/youtarr/:rw
      - /mnt/md1/MediaThumbnails/jellyfin/:/config/metadata/:rw
      - type: tmpfs
        target: /cache/
        tmpfs:
          size: 2gb

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    cap_drop: [ ALL, ]
    depends_on:
      jellyfin:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      LOG_LEVEL: debug
      TZ: UTC
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.jellyseerr-router.entrypoints: websecure
      traefik.http.routers.jellyseerr-router.rule: Host(`jellyseerr.bob.house`)
      traefik.http.routers.jellyseerr-router.tls: "true"
      traefik.http.services.jellyseerr-service.loadbalancer.server.port: "5055"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /app/config/logs/, ]
    volumes:
      - ~/.jellyseerr/:/app/config/:rw

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    cap_drop: [ ALL, ]
    command:
       - '*.zim'
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.kiwix-router.entrypoints: websecure
      traefik.http.routers.kiwix-router.rule: Host(`kiwix.bob.house`)
      traefik.http.routers.kiwix-router.tls: "true"
      traefik.http.services.kiwix-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - /mnt/md1/downloads/zim/:/data/:ro

  kopia:
    image: kopia/kopia:latest
    cap_drop: [ ALL, ]
    cap_add: [ DAC_OVERRIDE, ]
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=a72691ffb1328c15
      - --server-password=54b2ffddfbb10d02b59a5c2b8f9149ff
    configs:
      - source: kopiaignore
        target: /data/.kopiaignore
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/kopia.env
    labels:
      traefik.http.routers.kopia-router.entrypoints: websecure
      traefik.http.routers.kopia-router.rule: Host(`kopia-tana.bob.house`)
      traefik.http.routers.kopia-router.tls: "true"
      traefik.http.services.kopia-service.loadbalancer.server.port: "51515"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /app/cache/, /app/logs/, ]
    volumes:
      # Mount local folders needed by kopia
      - ~/.kopia/:/app/config/:rw
      # Mount local folders to snapshot
      - ~/.ganymede/:/data/ganymede/:ro
      - ~/.jellyfin/:/data/jellyfin/:ro
      - ~/.jellyseerr/:/data/jellyseerr/:ro
      - ~/.kopia//:/data/.kopia/:ro
      - ~/.lidarr/:/data/lidarr/:ro
      - ~/.metube/:/data/metube/:ro
      - ~/.navidrome/:/data/navidrome/:ro
      - ~/.nodered/:/data/nodered/:ro
      - ~/.pinepods/:/data/pinepods/:ro
      - ~/.prowlarr/:/data/prowlarr/:ro
      - ~/.qbittorrent/:/data/qbittorrent/:ro
      - ~/.radarr/:/data/radarr/:ro
      - ~/.sabnzbd/:/data/sabnzbd/:ro
      - ~/.sickgear/:/data/sickgear/:ro
      - ~/.sonarr/:/data/sonarr/:ro
      - ~/.tunarr/:/data/tunarr/:ro
      - ~/.youtarr/:/data/youtarr/:ro
      # Mount repository location
      - /repository/:/repository/:rw

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      qbittorrent:
        condition: service_started
      sabnzbd:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      PGID: "0"
      PUID: "0"
      TZ: Etc/UTC
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.lidarr-router.entrypoints: websecure
      traefik.http.routers.lidarr-router.rule: Host(`lidarr.bob.house`)
      traefik.http.routers.lidarr-router.tls: "true"
      traefik.http.services.lidarr-service.loadbalancer.server.port: "8686"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/Backups/, /config/logs/, '/run/:exec,mode=777', ]
    volumes:
      - ~/.lidarr/:/config/:rw
      - /mnt/md1/downloads/:/config/Downloads/complete/:rw
      - /mnt/md1/music/:/music/:rw
      - /mnt/md1/MediaThumbnails/lidarr/:/config/MediaCover/:rw

  metube:
    image: ghcr.io/alexta69/metube:latest
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      OUTPUT_TEMPLATE: '%(playlist_title&Playlist |)S%(playlist_title|)S%(playlist_uploader& by |)S%(playlist_uploader|)S%(playlist_autonumber& - |)S%(playlist_autonumber|)S%(playlist_count& of |)S%(playlist_count|)S%(playlist_autonumber& - |)S%(uploader,creator|UNKNOWN_AUTHOR)S %(release_date>%Y-%m-%d,upload_date>%Y-%m-%d|UNKNOWN_DATE)S - %(title|UNKNOWN_TITLE)S [%(id)s].%(ext)s'
      OUTPUT_TEMPLATE_PLAYLIST: '%(playlist_title&Playlist |)S%(playlist_title|)S%(playlist_uploader& by |)S%(playlist_uploader|)S%(playlist_autonumber& - |)S%(playlist_autonumber|)S%(playlist_count& of |)S%(playlist_count|)S%(playlist_autonumber& - |)S%(uploader,creator|UNKNOWN_AUTHOR)S %(release_date>%Y-%m-%d,upload_date>%Y-%m-%d|UNKNOWN_DATE)S - %(title|UNKNOWN_TITLE)S [%(id)s].%(ext)s'
      STATE_DIR: /data/state/
      TEMP_DIR: /data/temp/
      YTDL_OPTIONS: '{"cookiefile":"/cookies/cookies.txt","writesubtitles":true,"subtitleslangs":["en","-live_chat"],"updatetime":false,"postprocessors":[{"key":"Exec","exec_cmd":"chmod 0664","when":"after_move"},{"key":"FFmpegEmbedSubtitle","already_have_subtitle":false},{"key":"FFmpegMetadata","add_chapters":true}]}'
      PGID: "0"
      PUID: "0"
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.metube-router.entrypoints: websecure
      traefik.http.routers.metube-router.rule: Host(`metube.bob.house`)
      traefik.http.routers.metube-router.tls: "true"
      traefik.http.services.metube-service.loadbalancer.server.port: "8081"
    networks:
      default: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /data/temp/, ]
    volumes:
      - ~/.metube/:/data/:rw
      - ~/Configurations/cookies.txt:/cookies/cookies.txt:ro
      - /mnt/md1/youtube/:/downloads/:rw

  navidrome:
    image: deluan/navidrome:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      ND_BASEURL: ""
      ND_ENABLEINSIGHTSCOLLECTOR: "false"
      ND_LOGLEVEL: info
      ND_SCANSCHEDULE: 1h
      ND_SESSIONTIMEOUT: 24h
    labels:
      traefik.http.routers.navidrome-router.entrypoints: websecure
      traefik.http.routers.navidrome-router.rule: Host(`navidrome.bob.house`)
      traefik.http.routers.navidrome-router.tls: "true"
      traefik.http.services.navidrome-service.loadbalancer.server.port: "4533"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /data/cache/, ]
    volumes:
      - ~/.navidrome/:/data/:rw
      - /mnt/md1/music/:/music/:ro

  nodered:
    image: nodered/node-red:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/nodered.env
    environment:
      NODE_RED_DISABLE_TELEMETRY: "true"
      TZ: Etc/UTC
    labels:
      traefik.http.routers.nodered-router.entrypoints: websecure
      traefik.http.routers.nodered-router.rule: Host(`nodered.bob.house`)
      traefik.http.routers.nodered-router.tls: "true"
      traefik.http.services.nodered-service.loadbalancer.server.port: "1880"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.nodered/:/data/:rw
      - /mnt/md1/youtube/:/youtube/:rw

  pinepods:
    image: madeofpendletonwool/pinepods:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, SETGID, SETUID, ]
    depends_on:
      pinepods-db:
        condition: service_healthy
      pinepods-valkey:
        condition: service_started
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/pinepods.env
    environment:
      # Basic Server Info
      SEARCH_API_URL: https://search.pinepods.online/api/search
      PEOPLE_API_URL: https://people.pinepods.online
      HOSTNAME: https://pinepods.bob.house
      # Database Vars
      DB_TYPE: postgresql
      DB_HOST: pinepods-db
      DB_PORT: "5432"
      DB_USER: pinepods
      DB_NAME: pinepods
      # Valkey Settings
      VALKEY_HOST: pinepods-valkey
      VALKEY_PORT: "6379"
      # Enable or Disable Debug Mode for additional Printing
      DEBUG_MODE: "false"
      PUID: ${UID:-911}
      PGID: ${GID:-911}
      # Add timezone configuration
      TZ: Etc/UTC
    labels:
      dev.dozzle.group: pinepods
      traefik.docker.network: tana_traefik
      traefik.http.routers.pinepods-router.entrypoints: websecure
      traefik.http.routers.pinepods-router.rule: Host(`pinepods.bob.house`)
      traefik.http.routers.pinepods-router.tls: "true"
      traefik.http.services.pinepods-service.loadbalancer.server.port: "8040"
    networks:
      default: null
      pinepods: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - /mnt/md1/podcasts/:/opt/pinepods/downloads/:rw
      - /etc/localtime:/etc/localtime:ro

  pinepods-db:
    image: postgres:17
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID, ]
    env_file:
      - ~/Configurations/pinepods.env
    environment:
      POSTGRES_DB: pinepods
      POSTGRES_USER: pinepods
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d pinepods -U pinepods"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    labels:
      dd.tag.include: ^17$$
      dev.dozzle.group: pinepods
      traefik.enable: "false"
    networks:
      pinepods: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.pinepods/:/var/lib/postgresql/data/:rw

  pinepods-valkey:
    image: valkey/valkey:8-alpine
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    labels:
      dd.tag.include: ^8-alpine$$
      dev.dozzle.group: pinepods
      traefik.enable: "false"
    networks:
      pinepods: null
    security_opt: [ no-new-privileges=true, ]

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      qbittorrent:
        condition: service_started
      sabnzbd:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.prowlarr-router.entrypoints: websecure
      traefik.http.routers.prowlarr-router.rule: Host(`prowlarr.bob.house`)
      traefik.http.routers.prowlarr-router.tls: "true"
      traefik.http.services.prowlarr-service.loadbalancer.server.port: "9696"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/Backups/, /config/logs/, '/run/:exec,mode=777', ]
    volumes:
      - ~/.prowlarr/:/config/:rw

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "0"
      PGID: "0"
      TZ: Etc/UTC
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    labels:
      traefik.enable: "false"
    network_mode: service:gluetun
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/qBittorrent/GeoDB/, /config/qBittorrent/logs/, ]
    volumes:
      - ~/.qbittorrent/:/config/:rw
      - /mnt/md1/downloads/:/downloads/:rw

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      qbittorrent:
        condition: service_started
      sabnzbd:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      PGID: "0"
      PUID: "0"
      TZ: Etc/UTC
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.radarr-router.entrypoints: websecure
      traefik.http.routers.radarr-router.rule: Host(`radarr.bob.house`)
      traefik.http.routers.radarr-router.tls: "true"
      traefik.http.services.radarr-service.loadbalancer.server.port: "7878"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/Backups/, /config/logs/, '/run/:exec,mode=777', ]
    volumes:
      - ~/.radarr/:/config/:rw
      - /mnt/md1/downloads/:/config/Downloads/complete/:rw
      - /mnt/md1/films/:/movies/:rw
      - /mnt/md1/MediaThumbnails/radarr/:/config/MediaCover/:rw

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      HAS_IPV6: "false"
      PGID: "0"
      PUID: "0"
      TZ: Etc/UTC
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.sabnzbd-router.entrypoints: websecure
      traefik.http.routers.sabnzbd-router.rule: Host(`sabnzbd.bob.house`)
      traefik.http.routers.sabnzbd-router.tls: "true"
      traefik.http.services.sabnzbd-service.loadbalancer.server.port: "8080"
    networks:
      default: null
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/logs/, ]
    volumes:
      - ~/.sabnzbd/:/config/:rw
      - /mnt/md1/downloads/:/config/Downloads/complete/:rw
      - /mnt/md1/downloads/incomplete/:/config/Downloads/incomplete/:rw

  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    cap_drop: [ ALL, ]
    cap_add: [ DAC_READ_SEARCH, SYS_RAWIO, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/sda
      - /dev/sdb
      - /dev/sdc
      - /dev/sdd
      - /dev/sde
      - /dev/sdf
    labels:
      traefik.http.routers.scrutiny-router.entrypoints: websecure
      traefik.http.routers.scrutiny-router.rule: Host(`scrutiny.bob.house`)
      traefik.http.routers.scrutiny-router.tls: "true"
      traefik.http.services.scutiny-service.loadbalancer.server.port: "8080"
    networks:
      traefik: null
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.scrutiny/config/:/opt/scrutiny/config/:rw
      - ~/.scrutiny/influxdb/:/opt/scrutiny/influxdb/:rw
      - /run/udev:/run/udev:ro

  sickgear:
    image: sickgear/sickgear:latest
    cap_drop: [ ALL, ]
    cap_add: [ SETGID, ]
    depends_on:
      traefik:
        condition: service_healthy
    labels:
      traefik.http.routers.sickgear-router.entrypoints: websecure
      traefik.http.routers.sickgear-router.rule: Host(`sickgear.bob.house`)
      traefik.http.routers.sickgear-router.tls: "true"
      traefik.http.services.sickgear-service.loadbalancer.server.port: "8081"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /data/backup/, /data/cache/, /data/Logs/, ]
    volumes:
      - ~/.sickgear/config/:/config/:rw
      - ~/.sickgear/data/:/data/:rw
      - /mnt/md0/tvshows/:/tv/:rw
      - /mnt/md1/anime/:/anime/:rw
      - /mnt/md1/downloads/:/downloads/:rw
      - /mnt/md1/incoming/:/incoming/:rw
      - /mnt/md1/films/:/films/:rw
      - /mnt/md1/music/:/music/:rw
      - /mnt/md1/pictures/:/pictures/:rw
      - /mnt/md1/videos/:/videos/:rw

  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:3.4.0-r0-ls85
    cap_drop: [ ALL, ]
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      IMAGES: "1"
      INFO: "1"
      NETWORKS: "1"
      SERVICES: "1"
      VERSION: "1"
    healthcheck:
      test: wget --spider http://localhost:2375/version || exit 1
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "false"
    networks:
      default: null
      socket-proxy: null
    ports:
      - 192.168.1.70:2375:2375/tcp
      - 192.168.20.70:2375:2375/tcp
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /run, ]
    volumes: [ /var/run/docker.sock:/var/run/docker.sock:rw, ]

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, SETGID, SETUID, ]
    depends_on:
      qbittorrent:
        condition: service_started
      sabnzbd:
        condition: service_started
      traefik:
        condition: service_healthy
    environment:
      PGID: "0"
      PUID: "0"
      TZ: Etc/UTC
    extra_hosts:
      - "ntfy.bob.house=192.168.20.65"
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.sonarr-router.entrypoints: websecure
      traefik.http.routers.sonarr-router.rule: Host(`sonarr.bob.house`)
      traefik.http.routers.sonarr-router.tls: "true"
      traefik.http.services.sonarr-service.loadbalancer.server.port: "8989"
    networks:
      default: null
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/Backups/, /config/logs/, '/run/:exec,mode=777', ]
    volumes:
      - ~/.sonarr/:/config/:rw
      - /mnt/md0/tvshows/:/data/media/tvshows/:rw
      - /mnt/md1/downloads/:/config/Downloads/complete/:rw
      - /mnt/md1/MediaThumbnails/sonarr/:/config/MediaCover/:rw

  traefik:
    image: traefik:3.7.5
    cap_drop: [ ALL, ]
    command:
      # - --accesslog=true
      - --api.insecure=true
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.cloudflare.acme.email=mail@bob.codes
      - --certificatesresolvers.cloudflare.acme.storage=/var/certs/acme.json
      - --entrypoints.websecure.address=:443
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
      # TRACE  DEBUG  INFO  WARN  ERROR  FATAL  PANIC
      - --log.level=INFO
      - --metrics.prometheus=true
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --ping
      - --providers.docker
      - --providers.docker.endpoint=tcp://socket-proxy:2375
    depends_on:
      socket-proxy:
        condition: service_healthy
    env_file:
      - ~/Configurations/traefik.env
    healthcheck:
      test: /usr/local/bin/traefik healthcheck --ping
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.traefik-router.entrypoints: websecure
      traefik.http.routers.traefik-router.rule: Host(`traefik-tana.bob.house`)
      traefik.http.routers.traefik-router.tls: "true"
      traefik.http.routers.traefik-router.tls.certresolver: cloudflare
      traefik.http.routers.traefik-router.tls.domains[0].main: bob.house
      traefik.http.routers.traefik-router.tls.domains[0].sans: '*.bob.house'
      traefik.http.services.traefik-service.loadbalancer.server.port: "8080"
    networks:
      default: null
      socket-proxy: null
      traefik: null
    ports:
      - 192.168.1.70:443:443/tcp
      - 192.168.20.70:443:443/tcp
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - certificates-volume:/var/certs/:rw
      - /etc/localtime:/etc/localtime:ro

  tunarr:
    image: ghcr.io/chrisbenincasa/tunarr:latest-vaapi
    cap_drop: [ ALL, ]
    cap_add: [ DAC_OVERRIDE, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/dri:/dev/dri:rwm
    environment:
      LOG_LEVEL: INFO
      TZ: Etc/UTC
    labels:
      traefik.http.routers.tunarr-router.entrypoints: websecure
      traefik.http.routers.tunarr-router.rule: Host(`tunarr.bob.house`)
      traefik.http.routers.tunarr-router.tls: "true"
      traefik.http.services.tunarr-service.loadbalancer.server.port: "8000"
    networks:
      traefik: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /config/tunarr/backups/, /config/tunarr/cache/, /config/tunarr/logs/, /tunarr/streams/, '/root/.cache/:exec', ]
    volumes:
      - ~/.tunarr/:/config/tunarr/:rw
      - /mnt/md1/MediaThumbnails/tunarr/:/config/tunarr/images/:rw
      - /mnt/md1/anime/:/media/anime/:ro
      - /mnt/md1/films/:/media/films/:ro
      - /mnt/md1/streamers/:/media/streamers/:ro
      - /mnt/md0/tvshows/:/media/tv/:ro
      - /mnt/md1/videos/:/media/videos/:ro
      - /mnt/md1/music/:/media/music/:ro
      - /mnt/md1/pictures/:/media/pictures/:ro
      - /mnt/md1/youtube/:/media/youtube/:ro
      - /mnt/md1/youtarr/:/media/youtarr/:ro

  windows:
    image: dockurr/windows:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, NET_ADMIN, NET_BIND_SERVICE, NET_RAW, SETGID, SETUID, SYS_CHROOT, ]
    depends_on:
      traefik:
        condition: service_healthy
    devices:
      - /dev/kvm:/dev/kvm:rwm
      - /dev/net/tun:/dev/net/tun:rwm
    env_file:
      - ~/Configurations/windows-tana.env
    environment:
      VERSION: "2022"
      CPU_CORES: "4"
      DISK_SIZE: 32G
      RAM_SIZE: 8G
      REGION: en-GB
      KEYBOARD: en-GB
      USERNAME: bob
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.windows-router.entrypoints: websecure
      traefik.http.routers.windows-router.rule: Host(`windows-tana.bob.house`)
      traefik.http.routers.windows-router.tls: "true"
      traefik.http.services.windows-service.loadbalancer.server.port: "8006"
    networks:
      default: null
      traefik: null
    ports:
      - 192.168.1.70:3389:3389/tcp
      - 192.168.1.70:3389:3389/udp
      - 192.168.20.70:3389:3389/tcp
      - 192.168.20.70:3389:3389/udp
    security_opt: [ no-new-privileges=true, ]
    stop_grace_period: 2m0s
    volumes:
      - /mnt/md1/windows/:/storage/:rw
      - /mnt/:/data/:rw

  wireshark:
    image: lscr.io/linuxserver/wireshark:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, NET_ADMIN, NET_RAW, SETGID, SETUID, ]
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
    labels:
      traefik.docker.network: tana_traefik
      traefik.http.routers.wireshark-router.entrypoints: websecure
      traefik.http.routers.wireshark-router.rule: Host(`wireshark-tana.bob.house`)
      traefik.http.routers.wireshark-router.tls: "true"
      traefik.http.services.wireshark-service.loadbalancer.server.port: "3000"
    networks:
      default: null
      traefik: null
    shm_size: "1gb"
    stop_grace_period: 2m0s
    volumes: [ ~/.wireshark/:/config/:rw, ]

  youtarr:
    image: dialmaster/youtarr:latest
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_OVERRIDE, FOWNER, ]
    depends_on:
      traefik:
        condition: service_healthy
      youtarr-db:
        condition: service_healthy
    env_file:
      - ~/Configurations/youtarr.env
    environment:
      AUTH_ENABLED: "false"
      DB_HOST: youtarr-db
      DB_PORT: "3306"
      DB_NAME: youtarr
      LOG_LEVEL: INFO
      TZ: UTC
      YOUTUBE_OUTPUT_DIR: /mnt/md1/youtarr/
      YOUTARR_UID: "1000"
      YOUTARR_GID: "1000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      dev.dozzle.group: youtarr
      traefik.docker.network: tana_traefik
      traefik.http.routers.youtarr-router.entrypoints: websecure
      traefik.http.routers.youtarr-router.rule: Host(`youtarr.bob.house`)
      traefik.http.routers.youtarr-router.tls: "true"
      traefik.http.services.youtarr-service.loadbalancer.server.port: "3011"
    networks:
      default: null
      traefik: null
      youtarr: null
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /app/jobs/, /storage/rclone/storagebox/youtube/, /tmp/, ]
    volumes:
      - /mnt/md1/youtarr/:/usr/src/app/data/:rw
      - ~/.youtarr/images/:/app/server/images/:rw
      - ~/.youtarr/config/:/app/config/:rw

  youtarr-db:
    image: mariadb:10
    cap_drop: [ ALL, ]
    cap_add: [ CHOWN, DAC_READ_SEARCH, SETGID, SETUID, ]
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-file-per-table=1 --innodb-large-prefix=ON
    env_file:
      - ~/Configurations/youtarr.env
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
      MYSQL_DATABASE: youtarr
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      dev.dozzle.group: youtarr
    networks:
      youtarr: null
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /tmp/, ]
    volumes: [ ~/.youtarr/db/:/var/lib/mysql/:rw, ]

configs:
  kopiaignore:
    content: |
      /lidarr/logs.db*
      /metube/state/*.old
      /prowlarr/logs.db*
      /radarr/logs.db*
      /sonarr/logs.db*
      /tunarr/db*.bak

networks:
  default:
    name: tana_default
  ganymede:
    name: tana_ganymede
    internal: "true"
  pinepods:
    name: tana_pinepods
    internal: "true"
  socket-proxy:
    name: tana_socket-proxy
    internal: "true"
  traefik:
    name: tana_traefik
    internal: "true"
  youtarr:
    name: tana_youtarr
    internal: "true"

volumes:
  certificates-volume:
