http:
  middlewares:
    method-whitelist-plugin:
      plugin:
        method-whitelist:
          Message: "Method Not Allowed"
          Methods:
            - GET
  routers:
    miasma-router:
      entryPoints:
        - "websecure"
      rule: "Host(`miasma.bob.house`)"
      service: "miasma-service"
      tls: "true"
    www-router:
      entryPoints:
        - "websecure"
      middlewares:
        - method-whitelist-plugin
      rule: "Host(`www.bob.house`)"
      service: "www-service"
      tls: "true"
  services:
    miasma-service:
      loadBalancer:
        servers:
        - url: "http://192.168.20.85:9999"
    www-service:
      loadBalancer:
        servers:
        - url: "http://192.168.20.85:4040"
