services:
  kopia:
    image: kopia/kopia:latest
    cap_drop: [ ALL, ]
    cap_add: [ DAC_OVERRIDE, ]
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=a72691ffb1328c15
      - --server-password=54b2ffddfbb10d02b59a5c2b8f9149ff
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/kopia.env
    ports: [ 192.168.20.85:51515:51515/tcp, ]
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /app/cache/, /app/logs/, ]
    volumes:
      # Mount local folders needed by kopia
      - ~/.kopia/:/app/config/:rw
      # Mount local folders to snapshot
      - ~/.kopia/:/data/kopia/:ro
      - ~/.leafwiki/:/data/leafwiki/:ro
      # Mount repository location
      - /repository/:/repository/:rw

  leafwiki:
    image: ghcr.io/perber/leafwiki:latest
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/leafwiki.env
    environment:
      LEAFWIKI_ALLOW_INSECURE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:8080/api/config || exit 1", ]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 30s
    ports: [ 192.168.20.85:4040:8080/tcp, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: 1000:1000
    volumes: [ ~/.leafwiki/:/app/data/:rw, ]

  miasma:
    image: austinweeks/miasma:latest
    cap_drop: [ ALL, ]
    command: [ "--host", "0.0.0.0", "--port", "9999", "--link-count", "5", "--max-depth", "8", "--max-in-flight", "50", ]
    depends_on:
      traefik:
        condition: service_healthy
    ports: [ 192.168.20.85:9999:9999/tcp, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]

  traefik:
    image: traefik:3.7.5
    cap_drop: [ ALL, ]
    command:
      # - --accesslog=true
      - --api.insecure=true
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.cloudflare.acme.email=mail@bob.codes
      - --certificatesresolvers.cloudflare.acme.storage=/var/certs/acme.json
      - --entrypoints.websecure.address=:443
      - --experimental.plugins.method-whitelist.modulename=github.com/antoniomacri/traefik-method-whitelist
      - --experimental.plugins.method-whitelist.version=v1.0.1
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
      # TRACE  DEBUG  INFO  WARN  ERROR  FATAL  PANIC
      - --log.level=INFO
      - --metrics.prometheus=true
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --ping
      - --providers.file.directory=/etc/traefik/dynamic_conf/
    env_file:
      - ~/Configurations/traefik.env
    healthcheck:
      test: /usr/local/bin/traefik healthcheck --ping
    labels:
      traefik.http.routers.traefik-router.tls.certresolver: cloudflare
      traefik.http.routers.traefik-router.tls.domains[0].main: bob.house
      traefik.http.routers.traefik-router.tls.domains[0].sans: '*.bob.house'
    ports:
      - 192.168.20.85:443:443/tcp
      - 192.168.20.85:8080:8080/tcp
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.traefik/plugins/:/plugins-storage/:rw
      - certificates-volume:/var/certs/:rw
      - ./traefik.yml:/etc/traefik/dynamic_conf/conf.yml:ro
      - /etc/localtime:/etc/localtime:ro

volumes:
  certificates-volume:
