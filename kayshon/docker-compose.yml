services:
  glances:
    image: nicolargo/glances:latest
    cap_drop: [ ALL, ]
    cap_add: [ SYS_ADMIN, SYS_RAWIO, ]
    depends_on:
      socket-proxy:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
      GLANCES_OPT: -w
    networks:
      default: null
    profiles: [ app,monitoring, ]
    pid: host
    ports: [ 192.168.20.85:61208:61208/tcp, ]
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - /etc/os-release:/etc/os-release:ro

  kopia:
    image: kopia/kopia:latest
    cap_drop: [ ALL, ]
    cap_add: [ DAC_OVERRIDE, ]
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=a72691ffb1328c15
      - --server-password=54b2ffddfbb10d02b59a5c2b8f9149ff
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/kopia.env
    networks:
      default: null
    ports: [ 192.168.20.85:51515:51515/tcp, ]
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /app/cache/, /app/logs/, ]
    volumes:
      # Mount local folders needed by kopia
      - ~/.kopia/:/app/config/:rw
      # Mount local folders to snapshot
      - ~/.kopia/:/data/kopia/:ro
      - ~/.leafwiki/:/data/leafwiki/:ro
      # Mount repository location
      - /repository/:/repository/:rw

  leafwiki:
    image: ghcr.io/perber/leafwiki:v0.11.2
    cap_drop: [ ALL, ]
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - ~/Configurations/leafwiki.env
    environment:
      LEAFWIKI_ALLOW_INSECURE: "true"
      LEAFWIKI_CUSTOM_STYLESHEET: custom.css
      LEAFWIKI_PUBLIC_ACCESS: "true"
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:8080/api/config || exit 1", ]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      traefik: null
    profiles: [ app, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    user: 1000:1000
    volumes:
      - ~/.leafwiki/:/app/data/:rw
      - ./leafwiki.css:/app/data/custom.css:ro

  miasma:
    image: austinweeks/miasma:latest
    cap_drop: [ ALL, ]
    command: [ "--host", "0.0.0.0", "--port", "9999", "--link-count", "5", "--max-depth", "8", "--max-in-flight", "50", ]
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      traefik: null
    profiles: [ app, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]

  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    cap_drop: [ ALL, ]
    environment:
      DISABLE_IPV6: "true"
      LOG_LEVEL: info
      TZ: Etc/UTC

      CONTAINERS: "1"
      EVENTS: "1"
      IMAGES: "1"
      INFO: "1"
      NETWORKS: "1"
      PING: "1"
      SERVICES: "1"
      VERSION: "1"
      VOLUMES: "1"
    labels:
      traefik.enable: "false"
    networks:
      default: null
    ports: [ 192.168.20.85:2375:2375/tcp, ]
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    tmpfs: [ /run, /tmp, ]
    volumes: [ /var/run/docker.sock:/var/run/docker.sock:ro, ]

  traefik:
    image: traefik:3.7.5
    cap_drop: [ ALL, ]
    command:
      - --accesslog=true
      - --api.insecure=true
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.cloudflare.acme.email=mail@bob.codes
      - --certificatesresolvers.cloudflare.acme.storage=/var/certs/acme.json
      - --entrypoints.websecure.address=:443
      - --experimental.plugins.method-whitelist.modulename=github.com/antoniomacri/traefik-method-whitelist
      - --experimental.plugins.method-whitelist.version=v1.0.1
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
      # TRACE  DEBUG  INFO  WARN  ERROR  FATAL  PANIC
      - --log.level=INFO
      - --metrics.prometheus=true
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
      - --ping
      - --providers.file.directory=/etc/traefik/dynamic_conf/
    env_file:
      - ~/Configurations/traefik.env
    healthcheck:
      test: /usr/local/bin/traefik healthcheck --ping
    labels:
      traefik.docker.network: kayshon_traefik
      traefik.http.routers.traefik-router.tls.certresolver: cloudflare
      traefik.http.routers.traefik-router.tls.domains[0].main: bob.house
      traefik.http.routers.traefik-router.tls.domains[0].sans: '*.bob.house'
    networks:
      traefik: null
      traefik_public: null
    ports:
      - 192.168.20.85:443:443/tcp
      - 192.168.20.85:8080:8080/tcp
    read_only: true
    security_opt: [ no-new-privileges=true, ]
    volumes:
      - ~/.traefik/plugins/:/plugins-storage/:rw
      - certificates-volume:/var/certs/:rw
      - ./traefik.yml:/etc/traefik/dynamic_conf/conf.yml:ro
      - /etc/localtime:/etc/localtime:ro

networks:
  default:
    name: kayshon_default
  traefik:
    name: kayshon_traefik
    internal: "true"
  traefik_public:
    name: kayshon_traefik_public

volumes:
  certificates-volume:
